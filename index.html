<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SCL Digital Agency</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="public/css/style.css" />
</head>
<body>

  <!-- GATEWAY PANEL -->
  <div id="gateway" class="panel active">
    <div class="panel-inner">

      <div class="brand">
       
        <div class="brand-text">
          <span class="brand-name"> <img src="/images/SCL DA_White_Logo.png" width="50%" alt="SCL Shield" /></span>
          
        </div>
      </div>

      <div class="divider"></div>

      <h1 class="headline">
        <span class="line-1">WELCOME</span>
     
      </h1>

      <p class="subtext">Select your region to initialise your secure session. A single-use access token will be issued upon verification.</p>

      <div class="form-group">
        <label for="country" class="field-label">// REGION SELECT</label>
        <div class="select-wrapper">
          <select id="country">
            <option value="ZA">🇿🇦 South Africa</option>
            <option value="US">🇺🇸 United States</option>
            <option value="GB">🇬🇧 United Kingdom</option>
            <option value="NG">🇳🇬 Nigeria</option>
            <option value="KE">🇰🇪 Kenya</option>
            <option value="FR">🇫🇷 France</option>
            <option value="DE">🇩🇪 Germany</option>
          </select>
          <span class="select-arrow">▾</span>
        </div>
      </div>

      <div class="form-group">
        <label class="field-label">// DETECTED LANGUAGE</label>
        <div class="lang-display" id="lang-display">EN — ENGLISH</div>
      </div>

      <button id="continue-btn" class="btn-primary">
        <span class="btn-text">INITIATE ACCESS</span>
        <span class="btn-icon">→</span>
      </button>

      <div class="status-bar">
        <span class="status-dot"></span>
        <span id="status-text">AWAITING INPUT</span>
      </div>

    </div>
  </div>

  <!-- LOADING / TOKEN PANEL -->
  <div id="loading-panel" class="panel">
    <div class="panel-inner centered">
      <div class="loader-ring">
        <svg viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="32" class="ring-bg"/>
          <circle cx="40" cy="40" r="32" class="ring-progress"/>
        </svg>
        <span class="loader-icon">⬡</span>
      </div>
      <p class="loader-label" id="loader-label">REQUESTING TOKEN...</p>
      <div class="token-preview" id="token-preview"></div>
    </div>
  </div>

  <!-- MAIN APP PANEL -->
  <div id="app-panel" class="panel">
    <div class="panel-inner">

      <div class="app-header">
        <div class="brand small">
          <span class="shield-icon small">⬡</span>
          <span class="brand-name small">SCL SHIELD</span>
        </div>
        <div class="session-info">
          <span class="session-label">SESSION</span>
          <span class="session-token" id="session-token-display">—</span>
        </div>
        <button id="logout-btn" class="btn-logout">END SESSION</button>
      </div>

      <div id="app-content">
        <!-- Dynamic content loads here -->
      </div>

    </div>
  </div>

  <script src="public/js/gateway.js"></script>
</body>
</html>
