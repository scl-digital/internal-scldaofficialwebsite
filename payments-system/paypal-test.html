<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayPal Checkout Test</title>
  <script src="https://www.paypal.com/sdk/js?client-id=AbiazvGhTHXe7Hlww5PbvF8I-Mp_0B36vU-vjAJt5jzeRFH4BUrA9PUi0nKn5HC3KRToQPIwbz7uhXLg&currency=USD"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f8f9fa; margin: 0; padding: 0; }
    .container { max-width: 420px; margin: 60px auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(30,52,141,0.07); padding: 32px 24px; }
    h1 { color: #1e348d; text-align: center; margin-bottom: 18px; }
    .test-note { color: #888; font-size: 0.98em; margin-bottom: 18px; text-align: center; }
    #paypal-button-container { margin: 32px 0 0 0; }
    .success-message { color: #1e348d; text-align: center; font-size: 1.2em; margin-top: 32px; }
    .error-message { color: #dc3545; text-align: center; margin-top: 24px; }
    .debug { color: #888; font-size: 0.9em; margin-top: 18px; }
  </style>
    <!-- Google Translate API -->
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>
<body>
  <div class="container">
    <h1>PayPal Checkout Test</h1>
    <div class="test-note">
      This page uses PayPal Sandbox. Use a sandbox buyer account to test.<br>
      <strong>Amount:</strong> <span id="amount-display">USD 100.00</span>
    </div>
    <div id="paypal-button-container"></div>
    <div id="success-message" class="success-message" style="display:none;"></div>
    <div id="error-message" class="error-message" style="display:none;"></div>
    <div id="debug" class="debug"></div>
  </div>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    let cart = [];
    let total = 100.00;
    try {
      cart = JSON.parse(localStorage.getItem('scl_cart')) || [];
      if (cart.length) {
        total = 0;
        cart.forEach(item => {
          total += (item.price || 0) * (item.qty || 1);
        });
        if (total === 0) total = 100.00;
      }
    } catch (e) { total = 100.00; }
    document.getElementById('amount-display').textContent = 'USD ' + total.toFixed(2);

    if (typeof paypal === 'undefined') {
      document.getElementById('error-message').style.display = '';
      document.getElementById('error-message').textContent = 'PayPal SDK failed to load. Check your internet connection, client ID, or browser extensions.';
      document.getElementById('debug').textContent = 'Debug: SDK script src: https://www.paypal.com/sdk/js?client-id=AbiazvGhTHXe7Hlww5PbvF8I-Mp_0B36vU-vjAJt5jzeRFH4BUrA9PUi0nKn5HC3KRToQPIwbz7uhXLg&currency=USD';
      return;
    }

    paypal.Buttons({
      createOrder: function(data, actions) {
        return fetch('create-order.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount: "100.00" }) // Hardcoded for testing
        })
        .then(res => res.json())
        .then(order => order.id);
      },
      onApprove: function(data, actions) {
        return fetch('capture-order.php?orderID=' + data.orderID, {
          method: 'POST'
        })
        .then(res => res.json())
        .then(details => {
          localStorage.removeItem('scl_cart');
          document.getElementById('success-message').style.display = '';
          document.getElementById('success-message').innerHTML =
            '<strong>Thank you for your payment!</strong><br>Your order has been received.';
          document.getElementById('paypal-button-container').style.display = 'none';
        });
      },
      onError: function(err) {
        document.getElementById('error-message').style.display = '';
        document.getElementById('error-message').textContent = 'PayPal Checkout error: ' + err;
      }
    }).render('#paypal-button-container');
  });
  </script>
    <!-- Language Translator Widget Styles -->
    <style>
        .translator-widget {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .translator-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 14px;
            border: none;
            outline: none;
        }

        .translator-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .translator-button i {
            font-size: 16px;
        }

        .translator-dropdown {
            position: absolute;
            top: 60px;
            right: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            min-width: 280px;
            max-height: 400px;
            overflow: hidden;
            transform: scale(0) translateY(-20px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .translator-dropdown.active {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .translator-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .translator-header h4 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }

        .close-translator {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: background 0.2s;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-translator:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Google Translate Element Styling */
        #google_translate_element {
            padding: 15px 20px;
        }

        .goog-te-gadget {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important;
            font-size: 14px !important;
        }

        .goog-te-gadget-simple {
            background: transparent !important;
            border: none !important;
            padding: 0 !important;
        }

        .goog-te-gadget-simple .goog-te-menu-value {
            color: #333 !important;
            font-size: 14px !important;
            font-weight: 500 !important;
        }

        .goog-te-gadget-simple .goog-te-menu-value span:first-child {
            color: #667eea !important;
            font-weight: 600 !important;
        }

        .goog-te-gadget-simple .goog-te-menu-value span:last-child {
            color: #666 !important;
        }

        .goog-te-gadget-simple .goog-te-menu-value:before {
            content: "🌐 " !important;
            margin-right: 5px !important;
        }

        /* Hide Google Translate banner */
        .goog-te-banner-frame {
            display: none !important;
        }

        body {
            top: 0 !important;
        }

        /* Style the dropdown arrow */
        .goog-te-gadget-simple .goog-te-menu-value:after {
            content: " ▼" !important;
            color: #667eea !important;
            font-size: 12px !important;
        }

        .translator-footer {
            padding: 15px 20px;
            background: #f8f9fa;
            display: flex;
            justify-content: center;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .reset-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
        }

        .reset-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .translator-widget {
                top: 15px;
                right: 15px;
            }

            .translator-button {
                padding: 10px 16px;
                font-size: 13px;
            }

            .translator-dropdown {
                min-width: 260px;
                right: -10px;
            }

            .reset-btn {
                padding: 8px 16px;
                font-size: 11px;
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .translator-widget {
                top: 10px;
                right: 10px;
            }

            .translator-button {
                padding: 8px 12px;
                font-size: 12px;
            }

            .translator-button span {
                display: none;
            }

            .translator-dropdown {
                min-width: 240px;
                right: -20px;
            }
        }
    </style>

    <!-- Language Translator Widget -->
    <div class="translator-widget">
        <div class="translator-button" id="translatorBtn">
            <i class="fa-solid fa-language"></i>
            <span>Translate</span>
        </div>
        
        <div class="translator-dropdown" id="translatorDropdown">
            <div class="translator-header">
                <h4>Choose Language</h4>
                <button class="close-translator" id="closeTranslator">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            
            <!-- Google Translate Element -->
            <div id="google_translate_element"></div>
            
            <div class="translator-footer">
                <button class="reset-btn" id="resetBtn">
                    <i class="fa-solid fa-undo"></i>
                    Reset to English
                </button>
            </div>
        </div>
    </div>

    <!-- Google Translate Widget JavaScript -->
    <script>
        // Google Translate Element Initialization
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,es,fr,de,it,pt,ru,zh,ja,ko,ar,hi',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }

        // Simple Translator Widget Controller
        class SimpleTranslator {
            constructor() {
                this.isOpen = false;
                this.init();
            }

            init() {
                this.translatorBtn = document.getElementById('translatorBtn');
                this.translatorDropdown = document.getElementById('translatorDropdown');
                this.closeTranslator = document.getElementById('closeTranslator');
                this.resetBtn = document.getElementById('resetBtn');

                this.bindEvents();
            }

            bindEvents() {
                // Toggle dropdown
                this.translatorBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.toggleDropdown();
                });

                // Close dropdown
                this.closeTranslator.addEventListener('click', () => {
                    this.closeDropdown();
                });

                // Reset button
                this.resetBtn.addEventListener('click', () => {
                    this.resetTranslation();
                });

                // Close dropdown when clicking outside
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.translator-widget') && this.isOpen) {
                        this.closeDropdown();
                    }
                });

                // Keyboard navigation
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && this.isOpen) {
                        this.closeDropdown();
                    }
                });
            }

            toggleDropdown() {
                if (this.isOpen) {
                    this.closeDropdown();
                } else {
                    this.openDropdown();
                }
            }

            openDropdown() {
                this.translatorDropdown.classList.add('active');
                this.isOpen = true;
            }

            closeDropdown() {
                this.translatorDropdown.classList.remove('active');
                this.isOpen = false;
            }

            resetTranslation() {
                // Reset Google Translate to English
                if (window.google && window.google.translate) {
                    const translateElement = document.querySelector('.goog-te-combo');
                    if (translateElement) {
                        translateElement.selectedIndex = 0;
                        translateElement.dispatchEvent(new Event('change'));
                    }
                }

                // Remove Google Translate banner
                const banner = document.querySelector('.goog-te-banner-frame');
                if (banner) {
                    banner.remove();
                }

                // Reset body top position
                document.body.style.top = '0px';

                this.showNotification('Translation reset to English');
            }

            showNotification(message) {
                // Create notification element
                const notification = document.createElement('div');
                notification.style.cssText = `
                    position: fixed;
                    top: 80px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                    color: white;
                    padding: 12px 24px;
                    border-radius: 25px;
                    font-size: 14px;
                    font-weight: 600;
                    z-index: 10000;
                    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
                    animation: slideDown 0.3s ease;
                `;
                notification.textContent = message;
                document.body.appendChild(notification);

                // Remove notification after 3 seconds
                setTimeout(() => {
                    notification.style.animation = 'slideUp 0.3s ease';
                    setTimeout(() => notification.remove(), 300);
                }, 3000);
            }
        }

        // Initialize the translator when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new SimpleTranslator();
        });

        // Add CSS animations for notifications
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                from {
                    opacity: 0;
                    transform: translateX(-50%) translateY(-20px);
                }
                to {
                    opacity: 1;
                    transform: translateX(-50%) translateY(0);
                }
            }
            
            @keyframes slideUp {
                from {
                    opacity: 1;
                    transform: translateX(-50%) translateY(0);
                }
                to {
                    opacity: 0;
                    transform: translateX(-50%) translateY(-20px);
                }
            }
        `;
        document.head.appendChild(style);
    </script>

</body>
</html>
