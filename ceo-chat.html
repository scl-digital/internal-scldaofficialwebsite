<!DOCTYPE html>
<html lang="en">
<head>

    <title>Chat with Shinsa Lomboto - CEO & Founder | SCL Digital</title>
    <meta name="description" content="Chat directly with Shinsa Lomboto, CEO & Founder of Software Creative Labs. Get personalized assistance and insights.">
    
    <!-- Favicon -->

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/ceo-chatbot.css">
    
    <style>
        /* Additional styles specific to this page */
        body {
            font-family: 'Rajdhani', sans-serif;
            background: url('/images/background-image.png') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #333;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
            padding: 20px 0;
            text-align: center;
        }
        
        .header img {
            max-width: 200px;
            height: auto;
            margin-bottom: 10px;
        }
        
        .header h1 {
            margin: 0;
            color: #2c3e50;
            font-weight: 600;
        }
        
        .header p {
            margin: 5px 0 0;
            color: #7f8c8d;
            font-size: 1.1em;
        }
        
        .chat-container {
            max-width: 1000px;
            margin: 30px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-header h2 {
            margin: 0;
            font-size: 1.8em;
            font-weight: 600;
        }
        
        .chat-header p {
            margin: 5px 0 0;
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9ff;
        }
        
        .message {
            margin-bottom: 15px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .ceo-message {
            align-self: flex-start;
            margin-right: auto;
        }
        
        .user-message {
            align-self: flex-end;
            margin-left: auto;
        }
        
        .message-content {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        
        .ceo-message .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-radius: 0 12px 12px 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        
        .user-message .message-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 12px 0 12px 12px;
        }
        
        .typing-indicator {
            display: flex;
            padding: 10px 16px;
            margin-bottom: 15px;
            align-self: flex-start;
            background: white;
            border-radius: 0 12px 12px 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            width: auto;
        }
        
        .typing-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #667eea;
            margin: 0 2px;
            opacity: 0.4;
            animation: typing 1.4s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }
        
        .chat-input-container {
            padding: 15px;
            background: white;
            border-top: 1px solid #eaeef7;
        }
        
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        
        .chat-input {
            flex: 1;
            min-height: 24px;
            max-height: 120px;
            padding: 12px 16px;
            border: 2px solid #e0e4ff;
            border-radius: 8px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            line-height: 1.5;
            resize: none;
            transition: all 0.2s ease;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .send-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 46px;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 0;
        }

            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

            width: 20px;
            height: 20px;
        }

            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

            background: #f0f2ff;
            border: 1px solid #e0e4ff;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
            color: #4a5bd9;
            cursor: pointer;
            transition: all 0.2s ease;
        }

            background: #e0e4ff;
            transform: translateY(-1px);
        }

                border-radius: 8px;

                font-size: 1.5em;
            }

                font-size: 1em;

    </style>
    <!-- Google Translate API -->
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<body>
    <div class="header">
        <img src="/images/SCL_Blue.png" alt="SCL Digital">
        <h1>Chat with Shinsa Lomboto</h1>
        <p>CEO & Founder, Software Creative Labs</p>
    </div>
    
    <div class="chat-container">
        <div class="chat-header">
            <h2>Direct Chat with the CEO</h2>
            <p>Ask me anything about our services, projects, or vision</p>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <!-- Messages will be added here by JavaScript -->
        </div>
        
        <div class="chat-input-container">
            <div class="typing-indicator" id="typingIndicator" style="display: none;">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
            
            <div class="input-wrapper">
                <textarea 
                    id="chatInput" 
                    class="chat-input" 
                    placeholder="Type your message here..." 
                    rows="1"
                ></textarea>
                
                <button id="sendBtn" class="send-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            
            <div class="quick-options" id="quickOptions">
                <!-- Quick options will be added by JavaScript -->
            </div>
        </div>
    </div>
    
    <!-- Include the CEO Chatbot JavaScript -->
    <script src="/js/ceo-chatbot.js"></script>
    
    <script>
        // This will be used for the full-page chat version
        document.addEventListener('DOMContentLoaded', function() {
            const chatMessages = document.getElementById('chatMessages');
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const typingIndicator = document.getElementById('typingIndicator');
            const quickOptions = document.getElementById('quickOptions');
            
            // Sample quick options
            const quickOptionsData = [
                { text: 'Tell me about SCL Digital', action: () => sendMessage('Tell me about SCL Digital') },
                { text: 'What services do you offer?', action: () => sendMessage('What services do you offer?') },
                { text: 'How can I contact your team?', action: () => sendMessage('How can I contact your team?') },
                { text: 'View case studies', action: () => window.open('/case_studies.html', '_blank') }
            ];
            
            // Add quick options
            quickOptionsData.forEach(option => {
                const button = document.createElement('button');
                button.className = 'quick-option';
                button.textContent = option.text;
                button.addEventListener('click', option.action);
                quickOptions.appendChild(button);
            });
            
            // Add message to chat
            function addMessage(sender, message) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}-message`;
                
                const messageContent = document.createElement('div');
                messageContent.className = 'message-content';
                messageContent.textContent = message;
                
                messageDiv.appendChild(messageContent);
                chatMessages.appendChild(messageDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
            
            // Show typing indicator
            function showTypingIndicator(show) {
                typingIndicator.style.display = show ? 'flex' : 'none';
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
            
            // Send message
            async function sendMessage(message = null) {
                const userMessage = message || chatInput.value.trim();
                if (!userMessage) return;
                
                // Add user message
                if (!message) {
                    addMessage('user', userMessage);
                    chatInput.value = '';
                    adjustTextareaHeight();
                }
                
                // Show typing indicator
                showTypingIndicator(true);
                
                // Simulate AI response (in a real app, this would be an API call)
                setTimeout(() => {
                    showTypingIndicator(false);
                    const responses = [
                        "I'd be happy to help with that. Could you provide more details about what you're looking for?",
                        "That's a great question. Let me share some insights about that...",
                        "Thanks for your interest in SCL Digital. Let me explain...",
                        "I understand you're asking about that. Here's what I can tell you..."
                    ];
                    
                    const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                    addMessage('ceo', randomResponse);
                }, 1500);
            }
            
            // Auto-resize textarea
            function adjustTextareaHeight() {
                chatInput.style.height = 'auto';
                chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
            }
            
            // Event listeners
            sendBtn.addEventListener('click', sendMessage);
            
            chatInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            chatInput.addEventListener('input', adjustTextareaHeight);
            
            // Initial greeting
            setTimeout(() => {
                showTypingIndicator(true);
                setTimeout(() => {
                    showTypingIndicator(false);
                    addMessage('ceo', "Hello! I'm Shinsa Lomboto, CEO and Founder of Software Creative Labs. I'm here to assist you. How can I help you today?");
                }, 1000);
            }, 500);
        });
    </script>

    <!-- Google Translate Widget JavaScript -->
    <script>
        // Google Translate Element Initialization
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,es,fr,de,it,pt,ru,zh,ja,ko,ar,hi',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }

        // Simple Translator Widget Controller
        class SimpleTranslator {
            constructor() {
                this.isOpen = false;
                this.init();
            }

            init() {
                this.translatorBtn = document.getElementById('translatorBtn');
                this.translatorDropdown = document.getElementById('translatorDropdown');
                this.closeTranslator = document.getElementById('closeTranslator');
                this.resetBtn = document.getElementById('resetBtn');

                this.bindEvents();
            }

            bindEvents() {
                // Toggle dropdown
                this.translatorBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.toggleDropdown();
                });

                // Close dropdown
                this.closeTranslator.addEventListener('click', () => {
                    this.closeDropdown();
                });

                // Reset button
                this.resetBtn.addEventListener('click', () => {
                    this.resetTranslation();
                });

                // Close dropdown when clicking outside
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.translator-widget') && this.isOpen) {
                        this.closeDropdown();
                    }
                });

                // Keyboard navigation
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && this.isOpen) {
                        this.closeDropdown();
                    }
                });
            }

            toggleDropdown() {
                if (this.isOpen) {
                    this.closeDropdown();
                } else {
                    this.openDropdown();
                }
            }

            openDropdown() {
                this.translatorDropdown.classList.add('active');
                this.isOpen = true;
            }

            closeDropdown() {
                this.translatorDropdown.classList.remove('active');
                this.isOpen = false;
            }

            resetTranslation() {
                // Reset Google Translate to English
                if (window.google && window.google.translate) {
                    const translateElement = document.querySelector('.goog-te-combo');
                    if (translateElement) {
                        translateElement.selectedIndex = 0;
                        translateElement.dispatchEvent(new Event('change'));
                    }
                }

                // Remove Google Translate banner
                const banner = document.querySelector('.goog-te-banner-frame');
                if (banner) {
                    banner.remove();
                }

                // Reset body top position
                document.body.style.top = '0px';

                this.showNotification('Translation reset to English');
            }

            showNotification(message) {
                // Create notification element
                const notification = document.createElement('div');
                notification.style.cssText = `
                    position: fixed;
                    top: 80px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                    color: white;
                    padding: 12px 24px;
                    border-radius: 25px;
                    font-size: 14px;
                    font-weight: 600;
                    z-index: 10000;
                    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
                    animation: slideDown 0.3s ease;
                `;
                notification.textContent = message;
                document.body.appendChild(notification);

                // Remove notification after 3 seconds
                setTimeout(() => {
                    notification.style.animation = 'slideUp 0.3s ease';
                    setTimeout(() => notification.remove(), 300);
                }, 3000);
            }
        }

        // Initialize the translator when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new SimpleTranslator();
        });

        // Add CSS animations for notifications
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                from {
                    opacity: 0;
                    transform: translateX(-50%) translateY(-20px);
                }
                to {
                    opacity: 1;
                    transform: translateX(-50%) translateY(0);
                }
            }
            
            @keyframes slideUp {
                from {
                    opacity: 1;
                    transform: translateX(-50%) translateY(0);
                }
                to {
                    opacity: 0;
                    transform: translateX(-50%) translateY(-20px);
                }
            }
        `;
        document.head.appendChild(style);
    </script>
