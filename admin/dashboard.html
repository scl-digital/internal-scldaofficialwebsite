<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Client Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6fb; }
        .sidebar { min-height: 100vh; background: #1e348d; color: #fff; padding: 2rem 1rem; }
        .sidebar .nav-link { color: #fff; margin-bottom: 1rem; border-radius: 6px; }
        .sidebar .nav-link.active, .sidebar .nav-link:hover { background: #fff; color: #1e348d; }
        .navbar { background: #fff; box-shadow: 0 2px 8px rgba(30,52,141,0.06); }
        .admin-content { padding: 2rem; }
        .logout-btn { background: #e53e3e; color: #fff; border: none; border-radius: 6px; padding: 0.5rem 1.2rem; }
        .logout-btn:hover { background: #c53030; }
    </style>
    <!-- Google Translate API -->
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Admin Dashboard</a>
            <button class="logout-btn ms-auto" onclick="logout()">Logout</button>
        </div>
    </nav>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar">
                <div class="nav flex-column">
                    <a class="nav-link active" href="#" onclick="loadTab('clients')">Clients</a>
                    <a class="nav-link" href="#" onclick="loadTab('staff')">Staff</a>
                    <a class="nav-link" href="#" onclick="loadTab('services')">Services</a>
                    <a class="nav-link" href="#" onclick="loadTab('projects')">Projects</a>
                    <a class="nav-link" href="#" onclick="loadTab('invoices')">Invoices</a>
                </div>
            </nav>
            <main class="col-md-10 ms-sm-auto admin-content">
                <div id="adminContent">
                    <h2>Welcome, Admin!</h2>
                    <p>Select a section from the sidebar to manage data.</p>
                </div>
            </main>
        </div>
    </div>
    <script type="module">
    function logout() {
        localStorage.removeItem('adminUser');
        window.location.href = 'login.html';
    }
    async function loadTab(tab) {
        document.querySelectorAll('.sidebar .nav-link').forEach(link => link.classList.remove('active'));
        document.querySelector(`.sidebar .nav-link[onclick=\"loadTab('${tab}')\"]`).classList.add('active');
        if (tab === 'clients') {
            const mod = await import('./clients.js');
            mod.renderClientsTab();
        } else {
            document.getElementById('adminContent').innerHTML = `<h3>Loading ${tab.charAt(0).toUpperCase() + tab.slice(1)}...</h3>`;
        }
    }
    if (!localStorage.getItem('adminUser')) {
        window.location.href = 'login.html';
    }
    // Default to clients tab
    loadTab('clients');
    window.loadTab = loadTab;
    window.logout = logout;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Language Translator Widget Styles -->
    <style>
        .translator-widget {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .translator-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 14px;
            border: none;
            outline: none;
        }

        .translator-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .translator-button i {
            font-size: 16px;
        }

        .translator-dropdown {
            position: absolute;
            top: 60px;
            right: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            min-width: 280px;
            max-height: 400px;
            overflow: hidden;
            transform: scale(0) translateY(-20px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .translator-dropdown.active {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .translator-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .translator-header h4 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }

        .close-translator {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: background 0.2s;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-translator:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Google Translate Element Styling */
        #google_translate_element {
            padding: 15px 20px;
        }

        .goog-te-gadget {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important;
            font-size: 14px !important;
        }

        .goog-te-gadget-simple {
            background: transparent !important;
            border: none !important;
            padding: 0 !important;
        }

        .goog-te-gadget-simple .goog-te-menu-value {
            color: #333 !important;
            font-size: 14px !important;
            font-weight: 500 !important;
        }

        .goog-te-gadget-simple .goog-te-menu-value span:first-child {
            color: #667eea !important;
            font-weight: 600 !important;
        }

        .goog-te-gadget-simple .goog-te-menu-value span:last-child {
            color: #666 !important;
        }

        .goog-te-gadget-simple .goog-te-menu-value:before {
            content: "🌐 " !important;
            margin-right: 5px !important;
        }

        /* Hide Google Translate banner */
        .goog-te-banner-frame {
            display: none !important;
        }

        body {
            top: 0 !important;
        }

        /* Style the dropdown arrow */
        .goog-te-gadget-simple .goog-te-menu-value:after {
            content: " ▼" !important;
            color: #667eea !important;
            font-size: 12px !important;
        }

        .translator-footer {
            padding: 15px 20px;
            background: #f8f9fa;
            display: flex;
            justify-content: center;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .reset-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
        }

        .reset-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .translator-widget {
                top: 15px;
                right: 15px;
            }

            .translator-button {
                padding: 10px 16px;
                font-size: 13px;
            }

            .translator-dropdown {
                min-width: 260px;
                right: -10px;
            }

            .reset-btn {
                padding: 8px 16px;
                font-size: 11px;
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .translator-widget {
                top: 10px;
                right: 10px;
            }

            .translator-button {
                padding: 8px 12px;
                font-size: 12px;
            }

            .translator-button span {
                display: none;
            }

            .translator-dropdown {
                min-width: 240px;
                right: -20px;
            }
        }
    </style>

    <!-- Language Translator Widget -->
    <div class="translator-widget">
        <div class="translator-button" id="translatorBtn">
            <i class="fa-solid fa-language"></i>
            <span>Translate</span>
        </div>
        
        <div class="translator-dropdown" id="translatorDropdown">
            <div class="translator-header">
                <h4>Choose Language</h4>
                <button class="close-translator" id="closeTranslator">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            
            <!-- Google Translate Element -->
            <div id="google_translate_element"></div>
            
            <div class="translator-footer">
                <button class="reset-btn" id="resetBtn">
                    <i class="fa-solid fa-undo"></i>
                    Reset to English
                </button>
            </div>
        </div>
    </div>

    <!-- Google Translate Widget JavaScript -->
    <script>
        // Google Translate Element Initialization
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,es,fr,de,it,pt,ru,zh,ja,ko,ar,hi',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }

        // Simple Translator Widget Controller
        class SimpleTranslator {
            constructor() {
                this.isOpen = false;
                this.init();
            }

            init() {
                this.translatorBtn = document.getElementById('translatorBtn');
                this.translatorDropdown = document.getElementById('translatorDropdown');
                this.closeTranslator = document.getElementById('closeTranslator');
                this.resetBtn = document.getElementById('resetBtn');

                this.bindEvents();
            }

            bindEvents() {
                // Toggle dropdown
                this.translatorBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.toggleDropdown();
                });

                // Close dropdown
                this.closeTranslator.addEventListener('click', () => {
                    this.closeDropdown();
                });

                // Reset button
                this.resetBtn.addEventListener('click', () => {
                    this.resetTranslation();
                });

                // Close dropdown when clicking outside
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.translator-widget') && this.isOpen) {
                        this.closeDropdown();
                    }
                });

                // Keyboard navigation
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && this.isOpen) {
                        this.closeDropdown();
                    }
                });
            }

            toggleDropdown() {
                if (this.isOpen) {
                    this.closeDropdown();
                } else {
                    this.openDropdown();
                }
            }

            openDropdown() {
                this.translatorDropdown.classList.add('active');
                this.isOpen = true;
            }

            closeDropdown() {
                this.translatorDropdown.classList.remove('active');
                this.isOpen = false;
            }

            resetTranslation() {
                // Reset Google Translate to English
                if (window.google && window.google.translate) {
                    const translateElement = document.querySelector('.goog-te-combo');
                    if (translateElement) {
                        translateElement.selectedIndex = 0;
                        translateElement.dispatchEvent(new Event('change'));
                    }
                }

                // Remove Google Translate banner
                const banner = document.querySelector('.goog-te-banner-frame');
                if (banner) {
                    banner.remove();
                }

                // Reset body top position
                document.body.style.top = '0px';

                this.showNotification('Translation reset to English');
            }

            showNotification(message) {
                // Create notification element
                const notification = document.createElement('div');
                notification.style.cssText = `
                    position: fixed;
                    top: 80px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                    color: white;
                    padding: 12px 24px;
                    border-radius: 25px;
                    font-size: 14px;
                    font-weight: 600;
                    z-index: 10000;
                    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
                    animation: slideDown 0.3s ease;
                `;
                notification.textContent = message;
                document.body.appendChild(notification);

                // Remove notification after 3 seconds
                setTimeout(() => {
                    notification.style.animation = 'slideUp 0.3s ease';
                    setTimeout(() => notification.remove(), 300);
                }, 3000);
            }
        }

        // Initialize the translator when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new SimpleTranslator();
        });

        // Add CSS animations for notifications
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                from {
                    opacity: 0;
                    transform: translateX(-50%) translateY(-20px);
                }
                to {
                    opacity: 1;
                    transform: translateX(-50%) translateY(0);
                }
            }
            
            @keyframes slideUp {
                from {
                    opacity: 1;
                    transform: translateX(-50%) translateY(0);
                }
                to {
                    opacity: 0;
                    transform: translateX(-50%) translateY(-20px);
                }
            }
        `;
        document.head.appendChild(style);
    </script>

</body>
</html>
