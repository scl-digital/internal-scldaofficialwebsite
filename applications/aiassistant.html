                        Hello! I’m your AI Assistant. Ask me anything – from code to general knowledge, writing, ideas, and more!
                    </div>

            </div>
            <div class="chat-input-sticky">

                        <input type="file" id="fileInput" class="file-input" accept=".txt,.md,.csv,.json,.js,.py,.java,.c,.cpp,.html,.css,.ts,.tsx,.jsx,.xml,.sh,.php,.rb,.go,.rs,.swift,.kt,.sql,.pdf">
                    </label>
                    <textarea id="chatInput" class="chat-input" placeholder="Type your message... (Shift+Enter for newline)" rows="1"></textarea>
                    <button onclick="sendMessage()" class="btn" id="sendBtn">Send</button>

    <script>
        const API_KEY = 'AIzaSyDqrXG2P3VV025XwpLy_QBR0tJukXyTA6Y';
        const API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent';
        let chatHistory = [];
        let isTyping = false;
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const scrollToLatestBtn = document.getElementById('scrollToLatestBtn');
        // Type animation for AI
        async function typeAnimation(element, text) {
            element.innerHTML = '';
            isTyping = true;
            for (let i = 0; i < text.length; i++) {
                element.innerHTML += text[i] === '\n' ? '<br>' : text[i];
                await new Promise(r => setTimeout(r, 9 + Math.random()*18));
            }
            isTyping = false;
        }
        // Add message to chat
        function addMessage(sender, content, animated=false) {
            const messageElement = document.createElement('div');
            messageElement.className = `message ${sender}`;
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            if (sender === 'ai' && animated) {
                chatMessages.appendChild(messageElement);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                typeAnimation(messageContent, content);
            } else {
                messageContent.innerHTML = formatMessage(content);
            }
            messageElement.appendChild(messageContent);
            chatMessages.appendChild(messageElement);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            chatHistory.push({ sender, content });
        }
        // Format message content
        function formatMessage(content) {
            return content
                .replace(/```([\s\S]*?)```/g, '<pre style="background:#222;color:#fff;padding:12px;border-radius:8px;overflow-x:auto;">$1</pre>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\n/g, '<br>');
        }
        // Show/hide loading
        function showLoading(show) {
            document.getElementById('loadingIndicator').style.display = show ? 'block' : 'none';
        }
        // Show error
        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = message;
            document.body.appendChild(errorDiv);
            setTimeout(() => { document.body.removeChild(errorDiv); }, 5000);
        }
        // Send message
        async function sendMessage() {
            const input = chatInput;
            const message = input.value.trim();
            if (!message) return;
            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';
            showLoading(true);
            try {
                const historyText = chatHistory.map(m => (m.sender === 'user' ? 'User: ' : 'AI: ') + m.content).join('\n');
                const prompt = `${historyText}\nUser: ${message}\nAI:`;
                const response = await callGeminiAPI(prompt);
                addMessage('ai', response, true);
            } catch (error) {
                addMessage('ai', 'Sorry, I encountered an error while processing your request.');
                showError('Failed to get response: ' + error.message);
            } finally {
                showLoading(false);
            }
        }
        // File upload
        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.type === 'application/pdf' || /\.pdf$/i.test(file.name)) {
                addMessage('user', `<span class='file-message'>📎 Uploaded file: <strong>${file.name}</strong> (PDF)</span>`);
                showLoading(true);
                try {
                    const text = await extractPdfText(file);
                    if (!text) throw new Error('No text found in PDF.');
                    addMessage('user', `<pre style='background:#222;color:#fff;padding:12px;border-radius:8px;overflow-x:auto;'>${escapeHtml(text.slice(0, 2000))}${text.length > 2000 ? '\n... (truncated)' : ''}</pre>`);
                    const historyText = chatHistory.map(m => (m.sender === 'user' ? 'User: ' : 'AI: ') + m.content).join('\n');
                    const prompt = `${historyText}\nUser uploaded a PDF file named ${file.name} with the following extracted text:\n${text.slice(0, 8000)}\nAI: Please analyze, summarize, and answer any questions about this file.`;
                    const response = await callGeminiAPI(prompt);
                    addMessage('ai', response, true);
                } catch (error) {
                    addMessage('ai', 'Sorry, I could not extract text from the PDF.');
                    showError('Failed to extract PDF text: ' + error.message);
                } finally {
                    showLoading(false);
                }
                return;
            }
            if (!file.type.startsWith('text') && !/\.(txt|md|csv|json|js|py|java|c|cpp|html|css|ts|tsx|jsx|xml|sh|php|rb|go|rs|swift|kt|sql)$/i.test(file.name)) {
                addMessage('user', `<span class='file-message'>📎 Uploaded file: <strong>${file.name}</strong></span><br><pre style='background:#222;color:#fff;padding:12px;border-radius:8px;overflow-x:auto;'>${escapeHtml(file.name)}</pre>`);
                addMessage('ai', 'Sorry, only text-based files are supported for analysis.');
                return;
            }
            const reader = new FileReader();
            reader.onload = async function(ev) {
                const content = ev.target.result;
                addMessage('user', `<span class='file-message'>📎 Uploaded file: <strong>${file.name}</strong></span><br><pre style='background:#222;color:#fff;padding:12px;border-radius:8px;overflow-x:auto;'>${escapeHtml(content.slice(0, 2000))}${content.length > 2000 ? '\n... (truncated)' : ''}</pre>`);
                showLoading(true);
                try {
                    const historyText = chatHistory.map(m => (m.sender === 'user' ? 'User: ' : 'AI: ') + m.content).join('\n');
                    const prompt = `${historyText}\nUser uploaded a file named ${file.name} with the following content:\n${content.slice(0, 8000)}\nAI: Please analyze, summarize, and answer any questions about this file.`;
                    const response = await callGeminiAPI(prompt);
                    addMessage('ai', response, true);
                } catch (error) {
                    addMessage('ai', 'Sorry, I encountered an error while processing your file.');
                    showError('Failed to get response: ' + error.message);
                } finally {
                    showLoading(false);
                }
            };
            reader.onerror = function() {
                showError('Failed to read file.');
            };
            reader.readAsText(file);
        });
        // Type animation for welcome message
        window.addEventListener('DOMContentLoaded', () => {
            const welcome = document.getElementById('aiWelcomeMsg');
            if (welcome) {
                typeAnimation(welcome, welcome.textContent);
            }
        });
        // Scroll to latest logic
        function isAtBottom() {
            return chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight < 40;
        }
        function scrollToLatest() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        chatMessages.addEventListener('scroll', () => {
            if (!isAtBottom()) {
                scrollToLatestBtn.classList.remove('hide');
            } else {
                scrollToLatestBtn.classList.add('hide');
            }
        });
        scrollToLatestBtn.addEventListener('click', scrollToLatest);
        // Input events
        chatInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey && !isTyping) {
                e.preventDefault();
                sendMessage();
            }
        });
        chatInput.addEventListener('input', function(e) {
            e.target.style.height = 'auto';
            e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
        });
        // Gemini API call
        async function callGeminiAPI(prompt) {
            const response = await fetch(`${API_URL}?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                        temperature: 0.7,
                        topK: 40,
                        topP: 0.95,
                        maxOutputTokens: 2048,
                    }
                })
            });
            if (!response.ok) throw new Error(`API call failed: ${response.status}`);
            const data = await response.json();
            if (!data.candidates || !data.candidates[0] || !data.candidates[0].content) throw new Error('Invalid response from API');
            return data.candidates[0].content.parts[0].text;
        }
        // Escape HTML for code blocks
        function escapeHtml(text) {
            return text.replace(/[&<>"']/g, function(m) {
                return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'})[m];
            });
        }
        // PDF.js text extraction
        async function extractPdfText(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let text = '';
            const maxPages = Math.min(pdf.numPages, 10);
            for (let i = 1; i <= maxPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(item => item.str).join(' ') + '\n';
                if (text.length > 50000) break;
            }
            return text;
        }
    </script>

    <!-- Google Translate Widget JavaScript -->
    <script>
        // Google Translate Element Initialization
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,es,fr,de,it,pt,ru,zh,ja,ko,ar,hi',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }

        // Simple Translator Widget Controller
        class SimpleTranslator {
            constructor() {
                this.isOpen = false;
                this.init();
            }

            init() {
                this.translatorBtn = document.getElementById('translatorBtn');
                this.translatorDropdown = document.getElementById('translatorDropdown');
                this.closeTranslator = document.getElementById('closeTranslator');
                this.resetBtn = document.getElementById('resetBtn');

                this.bindEvents();
            }

            bindEvents() {
                // Toggle dropdown
                this.translatorBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.toggleDropdown();
                });

                // Close dropdown
                this.closeTranslator.addEventListener('click', () => {
                    this.closeDropdown();
                });

                // Reset button
                this.resetBtn.addEventListener('click', () => {
                    this.resetTranslation();
                });

                // Close dropdown when clicking outside
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.translator-widget') && this.isOpen) {
                        this.closeDropdown();
                    }
                });

                // Keyboard navigation
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && this.isOpen) {
                        this.closeDropdown();
                    }
                });
            }

            toggleDropdown() {
                if (this.isOpen) {
                    this.closeDropdown();
                } else {
                    this.openDropdown();
                }
            }

            openDropdown() {
                this.translatorDropdown.classList.add('active');
                this.isOpen = true;
            }

            closeDropdown() {
                this.translatorDropdown.classList.remove('active');
                this.isOpen = false;
            }

            resetTranslation() {
                // Reset Google Translate to English
                if (window.google && window.google.translate) {
                    const translateElement = document.querySelector('.goog-te-combo');
                    if (translateElement) {
                        translateElement.selectedIndex = 0;
                        translateElement.dispatchEvent(new Event('change'));
                    }
                }

                // Remove Google Translate banner
                const banner = document.querySelector('.goog-te-banner-frame');
                if (banner) {
                    banner.remove();
                }

                // Reset body top position
                document.body.style.top = '0px';

                this.showNotification('Translation reset to English');
            }

            showNotification(message) {
                // Create notification element
                const notification = document.createElement('div');
                notification.style.cssText = `
                    position: fixed;
                    top: 80px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                    color: white;
                    padding: 12px 24px;
                    border-radius: 25px;
                    font-size: 14px;
                    font-weight: 600;
                    z-index: 10000;
                    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
                    animation: slideDown 0.3s ease;
                `;
                notification.textContent = message;
                document.body.appendChild(notification);

                // Remove notification after 3 seconds
                setTimeout(() => {
                    notification.style.animation = 'slideUp 0.3s ease';
                    setTimeout(() => notification.remove(), 300);
                }, 3000);
            }
        }

        // Initialize the translator when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new SimpleTranslator();
        });

        // Add CSS animations for notifications
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                from {
                    opacity: 0;
                    transform: translateX(-50%) translateY(-20px);
                }
                to {
                    opacity: 1;
                    transform: translateX(-50%) translateY(0);
                }
            }
            
            @keyframes slideUp {
                from {
                    opacity: 1;
                    transform: translateX(-50%) translateY(0);
                }
                to {
                    opacity: 0;
                    transform: translateX(-50%) translateY(-20px);
                }
            }
        `;
        document.head.appendChild(style);
    </script>

</body>
</html>
