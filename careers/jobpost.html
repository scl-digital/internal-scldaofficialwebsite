<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechJobs - Find Your Dream Career</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .search-section {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .search-form {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        .search-input, .filter-select {
            padding: 15px 20px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .search-input {
            flex: 1;
            min-width: 300px;
        }

        .search-input:focus, .filter-select:focus {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .filter-select {
            cursor: pointer;
        }

        .search-btn {
            padding: 15px 30px;
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .jobs-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
        }

        .job-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .job-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(45deg, #ff6b6b, #667eea);
        }

        .job-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .job-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .company-name {
            color: #667eea;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .job-type {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .full-time { background: #e8f5e8; color: #2d7a2d; }
        .part-time { background: #fff3cd; color: #856404; }
        .contract { background: #d1ecf1; color: #0c5460; }
        .remote { background: #f8d7da; color: #721c24; }

        .job-details {
            margin: 20px 0;
        }

        .job-location, .job-salary {
            display: flex;
            align-items: center;
            margin: 10px 0;
            color: #666;
            font-size: 0.95rem;
        }

        .job-location::before {
            content: '📍';
            margin-right: 8px;
        }

        .job-salary::before {
            content: '💰';
            margin-right: 8px;
        }

        .job-description {
            color: #555;
            line-height: 1.6;
            margin: 15px 0;
        }

        .job-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 20px 0;
        }

        .tag {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .job-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .job-date {
            color: #888;
            font-size: 0.9rem;
        }

        .apply-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .apply-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .no-results {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            margin: 40px 0;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .search-form {
                flex-direction: column;
            }
            
            .search-input {
                min-width: 100%;
            }
            
            .jobs-container {
                grid-template-columns: 1fr;
            }
            
            .stats {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
    <!-- Google Translate API -->
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>TechJobs</h1>
            <p>Discover amazing career opportunities in technology</p>
        </header>

        <section class="search-section">
            <form class="search-form" id="searchForm">
                <input type="text" class="search-input" id="searchInput" placeholder="Search for jobs, companies, or keywords...">
                <select class="filter-select" id="locationFilter">
                    <option value="">All Locations</option>
                    <option value="New York">New York</option>
                    <option value="San Francisco">San Francisco</option>
                    <option value="London">London</option>
                    <option value="Remote">Remote</option>
                    <option value="Berlin">Berlin</option>
                    <option value="Austin">Austin</option>
                </select>
                <select class="filter-select" id="typeFilter">
                    <option value="">All Types</option>
                    <option value="full-time">Full Time</option>
                    <option value="part-time">Part Time</option>
                    <option value="contract">Contract</option>
                    <option value="remote">Remote</option>
                </select>
                <button type="submit" class="search-btn">Search Jobs</button>
            </form>
        </section>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="totalJobs">12</div>
                <div class="stat-label">Total Jobs</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="companiesCount">8</div>
                <div class="stat-label">Companies</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="remoteJobs">5</div>
                <div class="stat-label">Remote Jobs</div>
            </div>
        </div>

        <main class="jobs-container" id="jobsContainer">
            <!-- Jobs will be dynamically inserted here -->
        </main>

        <div class="no-results" id="noResults" style="display: none;">
            No jobs found matching your criteria. Try adjusting your search filters.
        </div>
    </div>

    <script>

                tags: ["Python", "Machine Learning", "TensorFlow", "SQL"],

            },
            {

                title: "Mobile App Developer",

                salary: "$90,000 - $130,000",

                tags: ["React Native", "iOS", "Android", "Firebase"],
                posted: "2 days ago"
            },
            {
                id: 7,
                title: "Backend Developer",
                company: "ServerSide Solutions",
                location: "Remote",
                type: "remote",
                salary: "$95,000 - $135,000",
                description: "Build robust and scalable backend systems that power our web and mobile applications.",
                tags: ["Python", "Django", "PostgreSQL", "Redis"],

            },
            {
                id: 8,
                title: "Product Manager",
                company: "ProductCo",
                location: "San Francisco",
                type: "full-time",
                salary: "$130,000 - $180,000",
                description: "Lead product development initiatives and work closely with engineering and design teams.",
                tags: ["Product Strategy", "Analytics", "Agile", "Stakeholder Management"],
                posted: "1 day ago"
            },
            {
                id: 9,
                title: "Cybersecurity Analyst",
                company: "SecureNet",
                location: "New York",
                type: "full-time",
                salary: "$85,000 - $125,000",
                description: "Protect our organization from cyber threats and ensure the security of our digital assets.",
                tags: ["Network Security", "Incident Response", "Risk Assessment", "Compliance"],
                posted: "6 days ago"
            },
            {
                id: 10,
                title: "UI Developer",
                company: "Interface Studios",
                location: "London",
                type: "part-time",
                salary: "£35,000 - £50,000",
                description: "Create stunning user interfaces and bring design concepts to life with modern web technologies.",
                tags: ["HTML", "CSS", "JavaScript", "Sass"],
                posted: "3 days ago"
            },
            {
                id: 11,
                title: "Machine Learning Engineer",
                company: "AI Research Lab",
                location: "Remote",
                type: "remote",
                salary: "$125,000 - $170,000",
                description: "Deploy machine learning models at scale and optimize AI systems for production environments.",
                tags: ["Python", "MLOps", "TensorFlow", "Kubernetes"],
                posted: "1 week ago"
            },
            {
                id: 12,
                title: "Frontend Architect",
                company: "Enterprise Solutions",
                location: "Berlin",
                type: "contract",
                salary: "€90,000 - €130,000",
                description: "Design and implement frontend architecture for large-scale enterprise applications.",
                tags: ["Architecture", "Micro-frontends", "Performance", "Scalability"],
                posted: "4 days ago"
            }
        ];

        let filteredJobs = [...jobsData];

        // DOM elements
        const jobsContainer = document.getElementById('jobsContainer');
        const searchInput = document.getElementById('searchInput');
        const locationFilter = document.getElementById('locationFilter');
        const typeFilter = document.getElementById('typeFilter');
        const searchForm = document.getElementById('searchForm');
        const noResults = document.getElementById('noResults');
        const totalJobsEl = document.getElementById('totalJobs');
        const companiesCountEl = document.getElementById('companiesCount');
        const remoteJobsEl = document.getElementById('remoteJobs');

        // Create job card HTML
        function createJobCard(job) {
            return `
                <div class="job-card" data-id="${job.id}">
                    <div class="job-header">
                        <div>
                            <h3 class="job-title">${job.title}</h3>
                            <div class="company-name">${job.company}</div>
                        </div>
                        <span class="job-type ${job.type}">${job.type.replace('-', ' ')}</span>
                    </div>
                    <div class="job-details">
                        <div class="job-location">${job.location}</div>
                        <div class="job-salary">${job.salary}</div>
                        <p class="job-description">${job.description}</p>
                        <div class="job-tags">
                            ${job.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                    <div class="job-footer">
                        <span class="job-date">${job.posted}</span>
                        <button class="apply-btn" onclick="applyToJob(${job.id})">Apply Now</button>
                    </div>
                </div>
            `;
        }

        // Render jobs
        function renderJobs(jobs) {
            if (jobs.length === 0) {
                jobsContainer.style.display = 'none';
                noResults.style.display = 'block';
            } else {
                jobsContainer.style.display = 'grid';
                noResults.style.display = 'none';
                jobsContainer.innerHTML = jobs.map(job => createJobCard(job)).join('');
            }
            updateStats(jobs);
        }

        // Update statistics
        function updateStats(jobs) {
            const uniqueCompanies = [...new Set(jobs.map(job => job.company))];
            const remoteJobsCount = jobs.filter(job => job.type === 'remote' || job.location === 'Remote').length;
            
            totalJobsEl.textContent = jobs.length;
            companiesCountEl.textContent = uniqueCompanies.length;
            remoteJobsEl.textContent = remoteJobsCount;
        }

        // Filter jobs based on search criteria
        function filterJobs() {
            const searchTerm = searchInput.value.toLowerCase();
            const locationValue = locationFilter.value;
            const typeValue = typeFilter.value;

            filteredJobs = jobsData.filter(job => {
                const matchesSearch = !searchTerm || 
                    job.title.toLowerCase().includes(searchTerm) ||
                    job.company.toLowerCase().includes(searchTerm) ||
                    job.description.toLowerCase().includes(searchTerm) ||
                    job.tags.some(tag => tag.toLowerCase().includes(searchTerm));

                const matchesLocation = !locationValue || job.location === locationValue;
                const matchesType = !typeValue || job.type === typeValue;

                return matchesSearch && matchesLocation && matchesType;
            });

            renderJobs(filteredJobs);
        }

        // Apply to job function
        function applyToJob(jobId) {
            const job = jobsData.find(j => j.id === jobId);
            alert(`Thanks for your interest in the ${job.title} position at ${job.company}! In a real application, this would redirect you to the application form.`);
        }

        // Event listeners
        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            filterJobs();
        });

        searchInput.addEventListener('input', filterJobs);
        locationFilter.addEventListener('change', filterJobs);
        typeFilter.addEventListener('change', filterJobs);

        // Add some animations
        function animateJobCards() {
            const cards = document.querySelectorAll('.job-card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    card.style.transition = 'all 0.5s ease';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, index * 100);
            });
        }

        // Initial render
        renderJobs(jobsData);
        setTimeout(animateJobCards, 100);
    </script>

    <!-- Google Translate Widget JavaScript -->
    <script>
        // Google Translate Element Initialization
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,es,fr,de,it,pt,ru,zh,ja,ko,ar,hi',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }

        // Simple Translator Widget Controller
        class SimpleTranslator {
            constructor() {
                this.isOpen = false;
                this.init();
            }

            init() {
                this.translatorBtn = document.getElementById('translatorBtn');
                this.translatorDropdown = document.getElementById('translatorDropdown');
                this.closeTranslator = document.getElementById('closeTranslator');
                this.resetBtn = document.getElementById('resetBtn');

                this.bindEvents();
            }

            bindEvents() {
                // Toggle dropdown
                this.translatorBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.toggleDropdown();
                });

                // Close dropdown
                this.closeTranslator.addEventListener('click', () => {
                    this.closeDropdown();
                });

                // Reset button
                this.resetBtn.addEventListener('click', () => {
                    this.resetTranslation();
                });

                // Close dropdown when clicking outside
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.translator-widget') && this.isOpen) {
                        this.closeDropdown();
                    }
                });

                // Keyboard navigation
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && this.isOpen) {
                        this.closeDropdown();
                    }
                });
            }

            toggleDropdown() {
                if (this.isOpen) {
                    this.closeDropdown();
                } else {
                    this.openDropdown();
                }
            }

            openDropdown() {
                this.translatorDropdown.classList.add('active');
                this.isOpen = true;
            }

            closeDropdown() {
                this.translatorDropdown.classList.remove('active');
                this.isOpen = false;
            }

            resetTranslation() {
                // Reset Google Translate to English
                if (window.google && window.google.translate) {
                    const translateElement = document.querySelector('.goog-te-combo');
                    if (translateElement) {
                        translateElement.selectedIndex = 0;
                        translateElement.dispatchEvent(new Event('change'));
                    }
                }

                // Remove Google Translate banner
                const banner = document.querySelector('.goog-te-banner-frame');
                if (banner) {
                    banner.remove();
                }

                // Reset body top position
                document.body.style.top = '0px';

                this.showNotification('Translation reset to English');
            }

            showNotification(message) {
                // Create notification element
                const notification = document.createElement('div');
                notification.style.cssText = `
                    position: fixed;
                    top: 80px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                    color: white;
                    padding: 12px 24px;
                    border-radius: 25px;
                    font-size: 14px;
                    font-weight: 600;
                    z-index: 10000;
                    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
                    animation: slideDown 0.3s ease;
                `;
                notification.textContent = message;
                document.body.appendChild(notification);

                // Remove notification after 3 seconds
                setTimeout(() => {
                    notification.style.animation = 'slideUp 0.3s ease';
                    setTimeout(() => notification.remove(), 300);
                }, 3000);
            }
        }

        // Initialize the translator when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new SimpleTranslator();
        });

        // Add CSS animations for notifications
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                from {
                    opacity: 0;
                    transform: translateX(-50%) translateY(-20px);
                }
                to {
                    opacity: 1;
                    transform: translateX(-50%) translateY(0);
                }
            }
            
            @keyframes slideUp {
                from {
                    opacity: 1;
                    transform: translateX(-50%) translateY(0);
                }
                to {
                    opacity: 0;
                    transform: translateX(-50%) translateY(-20px);
                }
            }
        `;
        document.head.appendChild(style);
    </script>

</body>
</html>
