<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Settings - SCL Digital Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .settings-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .settings-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .settings-header h1 {
            color: #1e348d;
            margin-bottom: 10px;
        }

        .form-label {
            font-weight: 600;
            color: #333;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e348d, #2563eb);
            border: none;
        }

        .alert {
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="settings-container">
        <div class="settings-header">
            <h1><i class="bi bi-envelope-gear"></i> Email Settings</h1>
            <p class="text-muted">Configure SMTP settings for sending event tickets and notifications</p>
        </div>

        <div id="alertContainer"></div>

        <form id="emailSettingsForm">
            <div class="row">
                <div class="col-md-8 mb-3">
                    <label for="smtp_host" class="form-label">SMTP Host</label>
                    <input type="text" class="form-control" id="smtp_host" placeholder="smtp.gmail.com" required>
                    <small class="text-muted">Example: smtp.gmail.com, smtp.office365.com</small>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="smtp_port" class="form-label">SMTP Port</label>
                    <input type="number" class="form-control" id="smtp_port" value="587" required>
                    <small class="text-muted">Usually 587 or 465</small>
                </div>
            </div>

            <div class="mb-3">
                <label for="smtp_username" class="form-label">SMTP Username (Email)</label>
                <input type="email" class="form-control" id="smtp_username" placeholder="your-email@gmail.com" required>
            </div>

            <div class="mb-3">
                <label for="smtp_password" class="form-label">SMTP Password / App Password</label>
                <input type="password" class="form-control" id="smtp_password"
                    placeholder="Leave blank to keep existing password">
                <small class="text-muted">For Gmail, use an <a href="https://support.google.com/accounts/answer/185833"
                        target="_blank">App Password</a></small>
            </div>

            <div class="mb-3">
                <label for="smtp_encryption" class="form-label">Encryption</label>
                <select class="form-select" id="smtp_encryption" required>
                    <option value="tls">TLS (recommended)</option>
                    <option value="ssl">SSL</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="from_email" class="form-label">From Email</label>
                <input type="email" class="form-control" id="from_email" placeholder="noreply@scldigitalagency.com"
                    required>
            </div>

            <div class="mb-3">
                <label for="from_name" class="form-label">From Name</label>
                <input type="text" class="form-control" id="from_name" placeholder="SCL Digital Agency" required>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="bi bi-save"></i> Save Email Settings
                </button>
                <a href="billing-admin.html" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Back to Admin Dashboard
                </a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = '../api';

        // Load existing settings
        async function loadSettings() {
            try {
                const response = await fetch(`${API_BASE}/get_email_settings.php`);
                const data = await response.json();

                if (data.success && data.data) {
                    document.getElementById('smtp_host').value = data.data.smtp_host || '';
                    document.getElementById('smtp_port').value = data.data.smtp_port || 587;
                    document.getElementById('smtp_username').value = data.data.smtp_username || '';
                    document.getElementById('smtp_encryption').value = data.data.smtp_encryption || 'tls';
                    document.getElementById('from_email').value = data.data.from_email || '';
                    document.getElementById('from_name').value = data.data.from_name || '';
                }
            } catch (error) {
                console.error('Error loading settings:', error);
            }
        }

        // Save settings
        document.getElementById('emailSettingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const settings = {
                smtp_host: document.getElementById('smtp_host').value,
                smtp_port: parseInt(document.getElementById('smtp_port').value),
                smtp_username: document.getElementById('smtp_username').value,
                smtp_password: document.getElementById('smtp_password').value,
                smtp_encryption: document.getElementById('smtp_encryption').value,
                from_email: document.getElementById('from_email').value,
                from_name: document.getElementById('from_name').value
            };

            try {
                const response = await fetch(`${API_BASE}/save_email_settings.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(settings)
                });

                const data = await response.json();

                const alertContainer = document.getElementById('alertContainer');
                if (data.success) {
                    alertContainer.innerHTML = `
                        <div class="alert alert-success alert-dismissible fade show" role="alert">
                            <i class="bi bi-check-circle"></i> <strong>Success!</strong> Email settings saved successfully.
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    `;
                    // Clear password field after successful save
                    document.getElementById('smtp_password').value = '';
                } else {
                    alertContainer.innerHTML = `
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="bi bi-exclamation-triangle"></i> <strong>Error!</strong> ${data.error || 'Failed to save settings'}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    `;
                }

                // Scroll to top to show alert
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (error) {
                console.error('Error saving settings:', error);
                document.getElementById('alertContainer').innerHTML = `
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-triangle"></i> <strong>Error!</strong> ${error.message}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;
            }
        });

        // Load settings on page load
        loadSettings();
    </script>
</body>

</html>
