<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Services — Mobile</title>
  <meta name="description" content="Services — Software Creative Labs (mobile)" />

  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Rajdhani', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      font-weight: 400
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header class="animate-in">
      <div class="brand">
        <img src="../images/SCL DA_White_Logo.png" alt="SCL Logo" class="brand-logo">
      </div>

      <style>
        .brand {
          display: flex;
          align-items: center;
        }

        .brand-logo {
          width: 120px;
          /* adjust size */
          height: auto;
          /* keeps proportions */
        }
      </style>
     
    </header>

    <section class="hero animate-in delay-1">
      <h1>Our Products</h1>
      <p>Digital Infrastructure Plans</p>
      
    </section>

    <div id="loading" class="animate-in delay-2" style="text-align:center; padding:40px; color:var(--text-muted)">
      <div style="font-weight:600; margin-bottom:8px">Loading services...</div>
      <div style="font-size:12px">Fetching latest plans</div>
    </div>

    <div id="dynamic-services-list" class="animate-in delay-2" style="display:none">
      <!-- Services injected here -->
    </div>

    <div class="cta-box animate-in delay-3" style="margin-top:24px">
      <h2 style="font-size:20px; margin-bottom:8px; color:white">Need something custom?</h2>
      <p style="color:var(--text-muted); margin-bottom:20px">We tailor our engagement to your specific needs.</p>
      <a href="/mobile/contact.html" class="btn-primary">Get a Quote</a>
    </div>

  </div>

  <nav class="bottom-nav">
    <a href="/mobile/index.html" class="bn-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke-linecap="round" stroke-linejoin="round" />
        <polyline points="9 22 9 12 15 12 15 22" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <span>Home</span>
    </a>
    <a href="/mobile/Products/products.html" class="bn-item">
      <svg xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 640 640"><!--!Font Awesome Free v7.1.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2025 Fonticons, Inc.-->
        <path fill="#ffffff"
          d="M296.5 69.2C311.4 62.3 328.6 62.3 343.5 69.2L562.1 170.2C570.6 174.1 576 182.6 576 192C576 201.4 570.6 209.9 562.1 213.8L343.5 314.8C328.6 321.7 311.4 321.7 296.5 314.8L77.9 213.8C69.4 209.8 64 201.3 64 192C64 182.7 69.4 174.1 77.9 170.2L296.5 69.2zM112.1 282.4L276.4 358.3C304.1 371.1 336 371.1 363.7 358.3L528 282.4L562.1 298.2C570.6 302.1 576 310.6 576 320C576 329.4 570.6 337.9 562.1 341.8L343.5 442.8C328.6 449.7 311.4 449.7 296.5 442.8L77.9 341.8C69.4 337.8 64 329.3 64 320C64 310.7 69.4 302.1 77.9 298.2L112 282.4zM77.9 426.2L112 410.4L276.3 486.3C304 499.1 335.9 499.1 363.6 486.3L527.9 410.4L562 426.2C570.5 430.1 575.9 438.6 575.9 448C575.9 457.4 570.5 465.9 562 469.8L343.4 570.8C328.5 577.7 311.3 577.7 296.4 570.8L77.9 469.8C69.4 465.8 64 457.3 64 448C64 438.7 69.4 430.1 77.9 426.2z" />
      </svg>
      <span>Products</span>
    </a>
    <a href="/mobile/Services/services.html" class="bn-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round" />
        <line x1="8" y1="21" x2="16" y2="21" stroke-linecap="round" stroke-linejoin="round" />
        <line x1="12" y1="17" x2="12" y2="21" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <span>Services</span>
    </a>
    <a href="/mobile/Events/eventspage.html" class="bn-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round" />
        <line x1="16" y1="2" x2="16" y2="6" stroke-linecap="round" stroke-linejoin="round" />
        <line x1="8" y1="2" x2="8" y2="6" stroke-linecap="round" stroke-linejoin="round" />
        <line x1="3" y1="10" x2="21" y2="10" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <span>Events</span>
    </a>
  </nav>

  <script>
    (function () {
      const api = '../../api/services.php';
      const container = document.getElementById('dynamic-services-list');
      const loading = document.getElementById('loading');

      function formatPrice(amount) {
        return 'R ' + Number(amount).toLocaleString();
      }

      function renderServices(services) {
        loading.style.display = 'none';
        container.style.display = 'grid';
        container.style.gap = '16px';

        if (!Array.isArray(services) || services.length === 0) {
          container.innerHTML = '<div style="text-align:center;color:var(--text-muted)">No services found.</div>';
          return;
        }

        container.innerHTML = services.map(svc => {
          let features = [];
          try {
            if (svc.features) {
              features = typeof svc.features === 'string' ? JSON.parse(svc.features) : svc.features;
            }
          } catch (e) { }

          // Limit features for mobile view
          const displayFeatures = features.slice(0, 3);
          const moreCount = features.length - 3;

          // Prepare cart data for this service
          const cartItem = [{
            name: svc.name,
            description: (svc.description || '').slice(0, 50) + '...',
            price: svc.price_amount || 0,
            quantity: 1
          }];
          const cartParam = encodeURIComponent(JSON.stringify(cartItem));

          return `
        <div class="card" style="padding:0; overflow:hidden">
          <div style="height:120px; background:url('${svc.image_url || '../images/default_product.png'}') center/cover; position:relative">
            <div style="position:absolute; inset:0; background:linear-gradient(to top, rgba(15,23,42,0.9), transparent)"></div>
            <div style="position:absolute; bottom:12px; left:16px; color:white">
              <div style="font-weight:700; font-size:18px">${svc.name}</div>
            </div>
          </div>
          <div style="padding:16px">
            <p style="font-size:13px; color:var(--text-muted); margin-bottom:12px; line-height:1.5">${(svc.description || '').slice(0, 100)}...</p>
            
            ${displayFeatures.length > 0 ? `
              <ul style="margin:0 0 16px 0; padding:0; list-style:none">
                ${displayFeatures.map(f => `
                  <li style="display:flex; gap:8px; align-items:center; font-size:12px; color:var(--text-main); margin-bottom:6px">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                    ${f}
                  </li>
                `).join('')}
                ${moreCount > 0 ? `<li style="font-size:11px; color:var(--text-muted); margin-left:22px">+ ${moreCount} more features</li>` : ''}
              </ul>
            ` : ''}

            <div style="display:flex; align-items:center; justify-content:space-between; margin-top:auto">
              <div>
                <div style="font-weight:700; font-size:16px; color:var(--text-main)">${formatPrice(svc.price_amount || 0)}</div>
                <div style="font-size:11px; color:var(--text-muted)">per ${svc.billing_period || 'month'}</div>
              </div>
              <div style="display:flex; gap:8px">
                 <a href="../../services-platform/checkout.html?cart=${cartParam}" style="padding:8px 16px; background:var(--primary); color:white; font-weight:600; font-size:13px; border-radius:8px; text-decoration:none">Pay Now</a>
                 <a href="${svc.details_url || '#'}" style="padding:8px 16px; background:var(--bg-card-hover); color:var(--primary); font-weight:600; font-size:13px; border-radius:8px; text-decoration:none">Details</a>
              </div>
            </div>
          </div>
        </div>
      `;
        }).join('');
      }

      fetch(api)
        .then(r => r.json())
        .then(json => {
          if (json && json.success && Array.isArray(json.data)) {
            renderServices(json.data);
          } else {
            renderServices([]);
          }
        })
        .catch(err => {
          console.error(err);
          renderServices([]);
        });

    })();
  </script>
</body>

</html>
