<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Contact Us — Mobile</title>
  <meta name="description" content="Contact Software Creative Labs — Mobile" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Rajdhani',system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;font-weight:400}
    .contact-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
    .contact-title{font-size:24px;font-weight:800;color:#fff;line-height:1.1}
    .contact-subtitle{font-size:13px;color:var(--text-muted);margin-top:6px;max-width:68%}
    .contact-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:20px;margin-bottom:24px;backdrop-filter:blur(12px)}
    .contact-info{display:grid;gap:16px}
    .contact-item{display:flex;align-items:flex-start;gap:14px}
    .contact-icon{width:44px;height:44px;border-radius:90px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
    .contact-item strong{display:block;font-size:15px;font-weight:700;color:#fff;margin-bottom:4px}
    .contact-item span,
    .contact-item a{font-size:13px;color:var(--text-muted);line-height:1.5;word-break:break-word}
    .contact-item a{color:#fff;text-decoration:none;opacity:.86}
    .contact-form{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px;backdrop-filter:blur(12px)}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:13px;font-weight:700;color:#fff;margin-bottom:10px}
    .form-group input,
    .form-group textarea,
    .form-group select{width:100%;padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.12);background:rgba(15,23,42,.92);color:#fff;font-size:14px;font-family:inherit}
    .form-group input::placeholder,
    .form-group textarea::placeholder{color:rgba(255,255,255,0.55)}
    .form-group textarea{min-height:120px;resize:vertical}
    .contact-submit{margin-top:4px}
    .contact-note{font-size:13px;color:var(--text-muted);margin-top:12px}
    .btn-secondary{background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.12)}
    
    .service-pills{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:16px}
    .service-pill{padding:12px 16px;border:1.5px solid rgba(255,255,255,0.12);border-radius:10px;background:rgba(15,23,42,.92);color:#fff;cursor:pointer;text-align:left;font-size:13px;font-weight:500;transition:all 0.2s;white-space:normal;line-height:1.4}
    .service-pill:active,
    .service-pill.selected{border-color:#fff;background:rgba(255,255,255,0.1)}
    .service-pill input{display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="animate-in contact-header">
      <div style="display:flex;align-items:center;gap:12px">
        <img src="images/SCL DA_White_Logo.png" alt="SCL Logo" style="width:132px;height:auto;border-radius:12px;" class="brand-logo">
        <div>
         
        </div>
      </div>
      <a href="index.html" style="font-size:14px;font-weight:600;color:var(--text-muted)">Home</a>
    </header>

    <section class="section animate-in delay-2 contact-card">
      <div class="contact-info">
        <div class="contact-item">
          <div class="contact-icon" style="background: #000000"><i class="fa-solid fa-envelope"></i></div>
          <div><strong>Email</strong><a href="mailto:Contact@softwarecreativelabs.com">Contact@softwarecreativelabs.com</a></div>
        </div>
        <div class="contact-item">
          <div class="contact-icon" style="background: #000000"><i class="fa-solid fa-phone"></i></div>
          <div><strong>Phone</strong><a href="tel:+27740194690">+27 74 019 4690</a></div>
        </div>
        <div class="contact-item">
          <div class="contact-icon" style="background: #000000"><i class="fa-solid fa-map-marker-alt"></i></div>
          <div><strong>Office</strong><span>Milnerton Mall, Cape Town, South Africa</span></div>
        </div>
      </div>
    </section>

    <section class="section animate-in delay-3 contact-form">
      <div class="section-header">
        <h2>Send a message</h2>
      </div>
      <form action="mailto:Contact@softwarecreativelabs.com" method="post" enctype="text/plain">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input id="name" type="text" name="name" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label for="company">Company / Project</label>
          <input id="company" type="text" name="company" placeholder="Your company or project name" required>
        </div>
        <div class="form-group">
          <label for="email">Work Email</label>
          <input id="email" type="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label>How can we help scale your vision?</label>
          <div class="service-pills">
            <label class="service-pill">
              <input type="checkbox" name="services" value="Custom Software Engineering / Web Apps / APIs">
              Custom Software Engineering / Web Apps / APIs
            </label>
            <label class="service-pill">
              <input type="checkbox" name="services" value="Product Design (UI/UX Systems & Prototyping)">
              Product Design (UI/UX Systems & Prototyping)
            </label>
            <label class="service-pill">
              <input type="checkbox" name="services" value="AI Integration & Automation (LLMs, RAG Pipelines)">
              AI Integration & Automation (LLMs, RAG Pipelines)
            </label>
            <label class="service-pill">
              <input type="checkbox" name="services" value="Digital Growth & Conversion Optimization (CRO, Analytics)">
              Digital Growth & Conversion Optimization (CRO, Analytics)
            </label>
            <label class="service-pill">
              <input type="checkbox" name="services" value="Cloud Architecture & DevOps (AWS/GCP, CI/CD)">
              Cloud Architecture & DevOps (AWS/GCP, CI/CD)
            </label>
            <label class="service-pill">
              <input type="checkbox" name="services" value="Digital Strategy & Tech Advisory (GTM, Roadmaps)">
              Digital Strategy & Tech Advisory (GTM, Roadmaps)
            </label>
          </div>
        </div>

        <div class="form-group">
          <label for="budget">Estimated Project Budget</label>
          <select id="budget" name="budget">
            <option value="">Select a budget range...</option>
            <option value="5k-10k">R5,000 – R10,000 (Small / Bootstrapped Project)</option>
            <option value="10k-50k">R10,000 – R50,000 (Medium MVP / Core Architecture)</option>
            <option value="50k-250k">R50,000 – R250,000+ (Enterprise / Deep Tech Integration)</option>
            <option value="retainer">Looking for a monthly retainer partnership</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Project Details</label>
          <textarea id="message" name="message" placeholder="Tell us about your project, goals, or what you need help with" required></textarea>
        </div>
        <button type="submit" class="btn-primary contact-submit">Send Message</button>
      </form>
    </section>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="bn-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9 22 9 12 15 12 15 22" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Home</span>
    </a>
    <a href="services-platform/our_services.html" class="bn-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path fill="#ffffff" d="M296.5 69.2C311.4 62.3 328.6 62.3 343.5 69.2L562.1 170.2C570.6 174.1 576 182.6 576 192C576 201.4 570.6 209.9 562.1 213.8L343.5 314.8C328.6 321.7 311.4 321.7 296.5 314.8L77.9 213.8C69.4 209.8 64 201.3 64 192C64 182.7 69.4 174.1 77.9 170.2L296.5 69.2zM112.1 282.4L276.4 358.3C304.1 371.1 336 371.1 363.7 358.3L528 282.4L562.1 298.2C570.6 302.1 576 310.6 576 320C576 329.4 570.6 337.9 562.1 341.8L343.5 442.8C328.6 449.7 311.4 449.7 296.5 442.8L77.9 341.8C69.4 337.8 64 329.3 64 320C64 310.7 69.4 302.1 77.9 298.2L112 282.4zM77.9 426.2L112 410.4L276.3 486.3C304 499.1 335.9 499.1 363.6 486.3L527.9 410.4L562 426.2C570.5 430.1 575.9 438.6 575.9 448C575.9 457.4 570.5 465.9 562 469.8L343.4 570.8C328.5 577.7 311.3 577.7 296.4 570.8L77.9 469.8C69.4 465.8 64 457.3 64 448C64 438.7 69.4 430.1 77.9 426.2z"/></svg>
      <span>Products</span>
    </a>
    <a href="applications/products.html" class="bn-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="3" width="20" height="14" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="8" y1="21" x2="16" y2="21" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="17" x2="12" y2="21" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Services</span>
    </a>
    <a href="events-platform/eventspage.html" class="bn-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="16" y1="2" x2="16" y2="6" stroke-linecap="round" stroke-linejoin="round"/><line x1="8" y1="2" x2="8" y2="6" stroke-linecap="round" stroke-linejoin="round"/><line x1="3" y1="10" x2="21" y2="10" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Events</span>
    </a>
  </nav>

  <script>
    // Pill button selection styling
    document.querySelectorAll('.service-pill').forEach(pill => {
      pill.addEventListener('click', function(e) {
        e.preventDefault();
        this.classList.toggle('selected');
        this.querySelector('input').checked = !this.querySelector('input').checked;
      });
    });
  </script>
</body>
</html>
