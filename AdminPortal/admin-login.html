<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SCL Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @font-face {
            font-family: scldafont;
            src: url(./fonts/Rajdhani-Medium.ttf);
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        body {
            font-family: scldafont;
            background: linear-gradient(135deg, #1e348d, #2563eb);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .btn-primary {
            background: linear-gradient(135deg, #1e348d, #2563eb);
            border: none;
            border-radius: 8px;
        }
    </style>
    <script>
        (function(){
            try {
                const existing = localStorage.getItem('scl_admin');
                if (existing) {
                    window.location.href = 'billing-admin.html';
                }
            } catch (e) {}
        })();
    </script>
    <script>
        async function login(event) {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const out = document.getElementById('error');
            out.textContent = '';
            if (!email || !password) { out.textContent = 'Email and password are required.'; return; }
            try {
                const res = await fetch('../api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, user_type: 'admin' })
                });
                const json = await res.json();
                if (json.success) {
                    const user = json.user || {};
                    if ((user.role || '') !== 'admin') {
                        out.textContent = 'Not an admin user.';
                        return;
                    }
                    localStorage.setItem('scl_admin', JSON.stringify({ id: user.id, email: user.email, name: user.name, role: user.role, ts: Date.now() }));
                    window.location.href = 'billing-admin.html';
                } else {
                    out.textContent = json.error || 'Login failed';
                }
            } catch (e) {
                out.textContent = 'Network error. Please try again.';
            }
        }
    </script>
    <!-- Google Translate API -->
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>
<body>
    <div class="container" style="max-width: 420px;">
        <div class="card p-4">
            <div class="text-center mb-3">
                <img src="SCLDALOGOV3.png" alt="SCL DA" style="max-width: 120px;">
            </div>
            <h3 class="text-center mb-3">Admin Login</h3>
            <form onsubmit="login(event)">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@scl.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Your password" required>
                </div>
                <div id="error" class="text-danger mb-2"></div>
                <button class="btn btn-primary w-100" type="submit">Sign In</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Language Translator Widget Styles -->
    <style>
        .translator-widget {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .translator-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 14px;
            border: none;
            outline: none;
        }

        .translator-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .translator-button i {
            font-size: 16px;
        }

        .translator-dropdown {
            position: absolute;
            top: 60px;
            right: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            min-width: 280px;
            max-height: 400px;
            overflow: hidden;
            transform: scale(0) translateY(-20px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .translator-dropdown.active {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .translator-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .translator-header h4 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }

        .close-translator {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: background 0.2s;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-translator:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Google Translate Element Styling */
        #google_translate_element {
            padding: 15px 20px;
        }

        .goog-te-gadget {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important;
            font-size: 14px !important;
        }

        .goog-te-gadget-simple {
            background: transparent !important;
            border: none !important;
            padding: 0 !important;
        }

        .goog-te-gadget-simple .goog-te-menu-value {
            color: #333 !important;
            font-size: 14px !important;
            font-weight: 500 !important;
        }

        .goog-te-gadget-simple .goog-te-menu-value span:first-child {
            color: #667eea !important;
            font-weight: 600 !important;
        }

        .goog-te-gadget-simple .goog-te-menu-value span:last-child {
            color: #666 !important;
        }

        .goog-te-gadget-simple .goog-te-menu-value:before {
            content: "🌐 " !important;
            margin-right: 5px !important;
        }

        /* Hide Google Translate banner */
        .goog-te-banner-frame {
            display: none !important;
        }

        body {
            top: 0 !important;
        }

        /* Style the dropdown arrow */
        .goog-te-gadget-simple .goog-te-menu-value:after {
            content: " ▼" !important;
            color: #667eea !important;
            font-size: 12px !important;
        }

        .translator-footer {
            padding: 15px 20px;
            background: #f8f9fa;
            display: flex;
            justify-content: center;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .reset-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
        }

        .reset-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .translator-widget {
                top: 15px;
                right: 15px;
            }

            .translator-button {
                padding: 10px 16px;
                font-size: 13px;
            }

            .translator-dropdown {
                min-width: 260px;
                right: -10px;
            }

            .reset-btn {
                padding: 8px 16px;
                font-size: 11px;
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .translator-widget {
                top: 10px;
                right: 10px;
            }

            .translator-button {
                padding: 8px 12px;
                font-size: 12px;
            }

            .translator-button span {
                display: none;
            }

            .translator-dropdown {
                min-width: 240px;
                right: -20px;
            }
        }
    </style>

    <!-- Language Translator Widget -->
    <div class="translator-widget">
        <div class="translator-button" id="translatorBtn">
            <i class="fa-solid fa-language"></i>
            <span>Translate</span>
        </div>
        
        <div class="translator-dropdown" id="translatorDropdown">
            <div class="translator-header">
                <h4>Choose Language</h4>
                <button class="close-translator" id="closeTranslator">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            
            <!-- Google Translate Element -->
            <div id="google_translate_element"></div>
            
            <div class="translator-footer">
                <button class="reset-btn" id="resetBtn">
                    <i class="fa-solid fa-undo"></i>
                    Reset to English
                </button>
            </div>
        </div>
    </div>

    <!-- Google Translate Widget JavaScript -->
    <script>
        // Google Translate Element Initialization
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,es,fr,de,it,pt,ru,zh,ja,ko,ar,hi',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }

        // Simple Translator Widget Controller
        class SimpleTranslator {
            constructor() {
                this.isOpen = false;
                this.init();
            }

            init() {
                this.translatorBtn = document.getElementById('translatorBtn');
                this.translatorDropdown = document.getElementById('translatorDropdown');
                this.closeTranslator = document.getElementById('closeTranslator');
                this.resetBtn = document.getElementById('resetBtn');

                this.bindEvents();
            }

            bindEvents() {
                // Toggle dropdown
                this.translatorBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.toggleDropdown();
                });

                // Close dropdown
                this.closeTranslator.addEventListener('click', () => {
                    this.closeDropdown();
                });

                // Reset button
                this.resetBtn.addEventListener('click', () => {
                    this.resetTranslation();
                });

                // Close dropdown when clicking outside
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.translator-widget') && this.isOpen) {
                        this.closeDropdown();
                    }
                });

                // Keyboard navigation
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && this.isOpen) {
                        this.closeDropdown();
                    }
                });
            }

            toggleDropdown() {
                if (this.isOpen) {
                    this.closeDropdown();
                } else {
                    this.openDropdown();
                }
            }

            openDropdown() {
                this.translatorDropdown.classList.add('active');
                this.isOpen = true;
            }

            closeDropdown() {
                this.translatorDropdown.classList.remove('active');
                this.isOpen = false;
            }

            resetTranslation() {
                // Reset Google Translate to English
                if (window.google && window.google.translate) {
                    const translateElement = document.querySelector('.goog-te-combo');
                    if (translateElement) {
                        translateElement.selectedIndex = 0;
                        translateElement.dispatchEvent(new Event('change'));
                    }
                }

                // Remove Google Translate banner
                const banner = document.querySelector('.goog-te-banner-frame');
                if (banner) {
                    banner.remove();
                }

                // Reset body top position
                document.body.style.top = '0px';

                this.showNotification('Translation reset to English');
            }

            showNotification(message) {
                // Create notification element
                const notification = document.createElement('div');
                notification.style.cssText = `
                    position: fixed;
                    top: 80px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                    color: white;
                    padding: 12px 24px;
                    border-radius: 25px;
                    font-size: 14px;
                    font-weight: 600;
                    z-index: 10000;
                    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
                    animation: slideDown 0.3s ease;
                `;
                notification.textContent = message;
                document.body.appendChild(notification);

                // Remove notification after 3 seconds
                setTimeout(() => {
                    notification.style.animation = 'slideUp 0.3s ease';
                    setTimeout(() => notification.remove(), 300);
                }, 3000);
            }
        }

        // Initialize the translator when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new SimpleTranslator();
        });

        // Add CSS animations for notifications
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                from {
                    opacity: 0;
                    transform: translateX(-50%) translateY(-20px);
                }
                to {
                    opacity: 1;
                    transform: translateX(-50%) translateY(0);
                }
            }
            
            @keyframes slideUp {
                from {
                    opacity: 1;
                    transform: translateX(-50%) translateY(0);
                }
                to {
                    opacity: 0;
                    transform: translateX(-50%) translateY(-20px);
                }
            }
        `;
        document.head.appendChild(style);
    </script>

</body>
</html>
