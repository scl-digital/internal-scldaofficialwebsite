<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCL DA Project Agreement Composer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --color-primary-dark: #1A1A2E;
            --color-accent-blue: #007bff;
            --color-accent-pink: #FF69B4;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fb; /* Light background for professional look */
        }
        .container {
            max-width: 1200px;
        }
        input[type="text"], textarea, select {
            border-radius: 0.5rem;
            border-color: #cbd5e1;
            padding: 0.75rem;
            width: 100%;
            transition: all 0.2s;
        }
        input:focus, textarea:focus, select:focus {
            border-color: var(--color-accent-blue);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25);
            outline: none;
        }
        .input-group label {
            font-weight: 600;
            color: #334155;
            margin-bottom: 0.5rem;
            display: block;
        }
        .btn-primary {
            background-color: var(--color-accent-blue);
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
        .generator-output {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: monospace; /* Keep monospace for the screen preview */
            line-height: 1.5;
            padding: 1.5rem;
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            min-height: 80vh;
            color: #1A1A2E; 
        }
        /* Style for the loading indicator */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .loading-overlay.visible {
            visibility: visible;
            opacity: 1;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-top: 4px solid var(--color-accent-blue);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-6 md:p-10">

    <!-- Loading Indicator -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div class="ml-4 text-gray-700">Generating PDF...</div>
    </div>

    <div class="container mx-auto">

        <header class="mb-8 border-b pb-4">
            <h1 class="text-4xl font-extrabold text-gray-900">
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-pink-500">SCL DA</span> Project Agreement Composer
            </h1>
            <p class="text-gray-600 mt-2">Generate tailored SCL DA Development Project Agreements.</p>
        </header>

        <!-- Status Message Area - Added for visual feedback -->
        <div id="statusMessage" class="mt-4 p-3 rounded-lg text-center font-semibold hidden transition-all duration-300"></div>

        <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Input Panel -->
            <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-lg h-fit sticky top-10">
                <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-3">Agreement Variables</h2>

                <!-- Project & Client Details -->
                <div class="space-y-4 mb-8">
                    <h3 class="text-lg font-semibold text-gray-700">Project & Client</h3>
                     <div class="input-group">
                        <label for="projectType">Project Type (e.g., eCommerce, Web Platform)</label>
                        <input type="text" id="projectType" value="eCommerce Platform Development">
                    </div>
                    <div class="input-group">
                        <label for="clientName">Prepared For (Client Name)</label>
                        <input type="text" id="clientName" value="Enter Client Name">
                    </div>
                    <div class="input-group">
                        <label for="clientEmail">Client Contact Email</label>
                        <input type="text" id="clientEmail" value="client@example.com">
                    </div>
                    <div class="input-group">
                        <label for="agreementDate">Agreement Date (YYYY-MM-DD)</label>
                        <input type="text" id="agreementDate">
                    </div>
                </div>
                
                <!-- Financial Details -->
                <div class="space-y-4 mb-8">
                    <h3 class="text-lg font-semibold text-gray-700">Financial Terms (ZAR)</h3>
                    <div class="input-group">
                        <label for="totalFee">Total Project Fee (e.g., 3000.00)</label>
                        <input type="text" id="totalFee" value="3000.00">
                    </div>
                    <div class="input-group">
                        <label for="revisionFee">Additional Revision Fee (per round)</label>
                        <input type="text" id="revisionFee" value="174.00">
                    </div>
                    <div class="input-group">
                        <label for="bankName">Bank Name</label>
                        <input type="text" id="bankName" value="FNB/RMB">
                    </div>
                     <div class="input-group">
                        <label for="accountNumber">Account Number</label>
                        <input type="text" id="accountNumber" value="63134146992">
                    </div>
                </div>

                <!-- Scope Details -->
                <div class="space-y-4 mb-8">
                    <h3 class="text-lg font-semibold text-gray-700">Project Scope & Milestones</h3>
                    <div class="input-group">
                        <label for="projectOverview">Project Overview (Description of Solution)</label>
                        <textarea id="projectOverview" rows="5">
This proposal document outlines a plan for the design, development, and deployment of a custom eCommerce Platform Development platform tailored to the specific needs of the Client. The aim is to empower the client with a scalable, secure, and user-focused solution that supports seamless transactions, product management, and customer engagement.
                        </textarea>
                    </div>
                    <div class="input-group">
                        <label for="keyOutcomes">Key Outcomes (List each outcome on a new line)</label>
                        <textarea id="keyOutcomes" rows="4">
A fully functional and secure ecommerce website
Admin dashboard for content, orders, and inventory management
Integrated payment gateway (e.g., PayFast, PayPal)
Mobile-first design for optimal usability across devices
Launch-ready platform with support and training
                        </textarea>
                    </div>
                    <div class="input-group">
                        <label for="workPlan">Work Plan (Copy Table Data - Week | Phase | Deliverable)</label>
                        <textarea id="workPlan" rows="10">
Week 1 | Concept Phase | Requirements gathering, stakeholder alignment
Week 1 | Concept Phase | Competitor analysis, persona insights
Week 2 | Concept Phase | Proposed structure and navigation outline
Week 2 | Design Phase | Initial Design Concepts, Moodboard, typography, color palette
Week 3 | Design Phase | Wireframes & High-fidelity UI mockups for desktop & mobile
Week 4 | Technical Phase | Responsive HTML/CSS/JS based on UI
Week 4 | Technical Phase | Product management, user accounts, cart logic
Week 5 | Technical Phase | Payment Gateway Integration (PayFast, PayPal)
Week 5 | Technical Phase | Admin Dashboard Setup (Order, inventory & content management panel)
Week 6 | Testing Phase | Functional Testing, Bug fixes, mobile/browser compatibility check
Week 6 | Testing Phase | Client Review & Feedback, Revision round
End of Week 6 | Live & Handover | Launch, training session, documentation
                        </textarea>
                    </div>
                </div>

                <!-- Actions -->
                <button onclick="generateAgreement()" class="w-full btn-primary text-white font-bold py-3 rounded-lg shadow-md hover:shadow-lg transition">
                    Generate Project Agreement
                </button>
            </div>

            <!-- Output Panel -->
            <div class="lg:col-span-2">
                <div class="bg-white p-6 rounded-xl shadow-lg mb-6">
                    <h2 class="text-2xl font-bold mb-4 text-gray-800">Generated Project Agreement Text</h2>
                    <div class="flex space-x-4 mb-4">
                        <button onclick="copyToClipboard()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 rounded-lg transition duration-150">
                            Copy Text
                        </button>
                        <button onclick="downloadTxtFile()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 rounded-lg transition duration-150">
                            Download .txt File
                        </button>
                        <button onclick="downloadPdfFile()" class="flex-1 bg-pink-500 hover:bg-pink-600 text-white font-bold py-2 rounded-lg transition duration-150">
                            Download PDF File
                        </button>
                    </div>
                    <textarea id="agreementOutput" class="generator-output w-full"></textarea>
                </div>
            </div>

        </main>
    </div>

    <script>
        // Use window.jspdf due to UMD import
        const { jsPDF } = window.jspdf;

        document.addEventListener('DOMContentLoaded', () => {
            // Set current date as default Agreement Date
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('agreementDate').value = today;
            
            // Set default project overview text (requires projectType value to be set)
            const projectTypeDefault = document.getElementById('projectType').value;
             document.getElementById('projectOverview').value = `This proposal document outlines a plan for the design, development, and deployment of a custom ${projectTypeDefault} platform tailored to the specific needs of the Client. The aim is to empower the client with a scalable, secure, and user-focused online store that supports seamless transactions, product management, and customer engagement.`;

            // Generate immediately on load with defaults
            generateAgreement(); 
        });

        function getCurrentDateFormatted(dateString) {
            const date = new Date(dateString);
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }
        
        function formatCurrency(amount) {
            if (isNaN(amount) || amount === null) return "ZAR 0.00";
            return `ZAR ${parseFloat(amount).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, " ")}`;
        }

        function generateAgreement() {
            // Get input values (Used here only to populate the screen's text area)
            const clientName = document.getElementById('clientName').value.trim();
            const clientEmail = document.getElementById('clientEmail').value.trim();
            const projectType = document.getElementById('projectType').value.trim();
            const agreementDate = document.getElementById('agreementDate').value.trim();
            
            // Safely parse fees, defaulting to 0 if input is non-numeric
            const totalFeeInput = document.getElementById('totalFee').value.replace(/[^0-9.]/g, '');
            const revisionFeeInput = document.getElementById('revisionFee').value.replace(/[^0-9.]/g, '');
            const totalFee = parseFloat(totalFeeInput) || 0;
            const revisionFee = parseFloat(revisionFeeInput) || 0;

            const bankName = document.getElementById('bankName').value.trim();
            const accountNumber = document.getElementById('accountNumber').value.trim();
            const projectOverview = document.getElementById('projectOverview').value.trim();
            const keyOutcomes = document.getElementById('keyOutcomes').value.trim();
            const workPlanInput = document.getElementById('workPlan').value.trim();
            
            // Calculate financial breakdown
            const halfFee = totalFee / 2;
            const formattedTotal = formatCurrency(totalFee);
            const formattedHalf = formatCurrency(halfFee);
            const formattedRevisionFee = formatCurrency(revisionFee);
            const formattedDate = getCurrentDateFormatted(agreementDate);

            // Work Plan Formatting (converting plain text rows into a formatted table-like structure for the TEXTAREA)
            const workPlanLines = workPlanInput.split('\n').filter(line => line.trim() !== '');
            let formattedWorkPlan = "Week | Phase | Deliverables\n";
            formattedWorkPlan += "--------------------------------------------------------\n";
            workPlanLines.forEach(line => {
                const parts = line.split('|').map(p => p.trim());
                if (parts.length >= 3) {
                    // Use a slightly different pad for monospace output to look like a table
                    formattedWorkPlan += `${parts[0].padEnd(5, ' ')} | ${parts[1].padEnd(14, ' ')} | ${parts.slice(2).join(' ').trim()}\n`;
                }
            });
            formattedWorkPlan = formattedWorkPlan.trim();
            
            // Key Outcomes Formatting for TEXTAREA
            const formattedKeyOutcomes = keyOutcomes.split('\n')
                .filter(line => line.trim() !== '')
                .map(line => `- ${line.trim()}`)
                .join('\n');


            // Template Content (Mirroring the PDF structure in plain text for the screen preview)
            const template = `
SCL DA Project Agreement - ${projectType.toUpperCase()}

Created by: Shinsa L Lomboto (shinsa@softwarecreativelabs.com)
Prepared for: ${clientName} (${clientEmail})
Date: ${formattedDate}
--------------------------------------------------------------------------------

1. ABOUT SCL DA DEVELOPMENT™

SCL DA Development™ is the technology arm of SCL Digital Agency, offering technology development solutions that blend creative innovation with smart engineering. We specialize in web platforms, mobile apps, software systems, and digital experiences.

--------------------------------------------------------------------------------

2. PROJECT OVERVIEW

${projectOverview}

Key Outcomes:
${formattedKeyOutcomes}

--------------------------------------------------------------------------------

3. WORK PLAN AND MILESTONES

The following milestones define the key deliverables and timeline for this project:

${formattedWorkPlan}

--------------------------------------------------------------------------------

4. SERVICE FEES

Deposit: ${formattedHalf}
Full Settlement: ${formattedHalf}
Total: ${formattedTotal}

--------------------------------------------------------------------------------

5. PAYMENT POLICY

Client shall pay us ${formattedTotal} for the services performed under this contract. The payment policy for the project is:

A non-refundable down payment of 50% (${formattedHalf}) of the total project cost upon signing this contract.
The remaining 50% (${formattedHalf}) shall be paid in full before the delivery of the final materials and official site launch.

Payments can be made via:
Bank: ${bankName}
Account Number: ${accountNumber}
Account Holder: SCL Digital Agency (Pty) Ltd
Branch Code: [Insert Branch Code]
Swift Code: [Insert Swift Code]

--------------------------------------------------------------------------------

6. OWNERSHIP & RIGHTS

Transfer of Rights:
Upon full payment of the compensation set forth in this contract, Client shall be the exclusive owner of all intellectual property rights, including but not limited to copyrights and trademarks, in and to the work product produced by Developer/Designer in connection with this contract. All sketches designed during this project, which are not used by the Client, will remain the property of the Developer/Designer.

Trademark Infringements:
The Developer/Designer shall not be held responsible for any costs or legal liabilities arising from trademark infringements or other intellectual property issues related to the design materials after full payment has been made.

Portfolio Usage:
The Developer/Designer is granted the right to use the completed design materials for portfolio and self-promotion purposes.

--------------------------------------------------------------------------------

7. AGREEMENTS

Revision and Feedback
The Client agrees to provide timely feedback and request revisions, if necessary, within 3 days of receiving deliverables. The client receives a maximum of 7 revisions. In the event that further revisions become necessary beyond what was initially agreed upon, each additional round of revisions will incur an additional fee of ${formattedRevisionFee} per round. These charges will be included in the final invoice.

Confidentiality
Client and Developer/Designer agree to maintain the confidentiality of any proprietary or sensitive information shared during the project.

Cancellation
Client or Developer/Designer may terminate this contract with written notice if the other Party breaches any material term or condition. In the event of termination, the Client shall pay for any work completed up to that point. If the Client decides to cancel the project after ideas and proposals have been submitted, refunds for any previous payments made will not be provided.

Unforeseen Circumstances
In the event that the Designer becomes incapacitated or unable to continue the project due to unexpected and uncontrollable circumstances (e.g., acts of nature, illness, or other emergencies), a portion of the total project budget may be reimbursed. In most cases, a full refund will be issued. If the work completed thus far can be utilized by another designer to continue the project, a refund percentage will be determined based on the work completed. Alternatively, any reasonable suggestions for handling the situation will be taken into consideration.

Project Suspension
Should the project need to be suspended for any reason, the Client and Developer/Designer shall discuss the terms and conditions for resuming the project at a later date.

Entire Agreement
This agreement constitutes the entire agreement between the parties and supersedes all prior negotiations, understandings, and agreements between them, whether written or oral, relating to the subject matter of this contract.

Amendment
This agreement may be amended or modified only by written agreement signed by both parties.

--------------------------------------------------------------------------------

8. SIGNATURES

By signing below, the parties acknowledge their understanding and acceptance of the terms and conditions outlined in this Agreement.

CLIENT'S SIGNATURE: ___________________________________
Date: _________________________

DESIGNER / DEVELOPER'S SIGNATURE: ___________________________________
Date: _________________________

--------------------------------------------------------------------------------
            `;

            document.getElementById('agreementOutput').value = template.trim();
        }

        function copyToClipboard() {
            const output = document.getElementById('agreementOutput');
            output.select();
            // Fallback for secure copy since execCommand is discouraged but works in iFrames
            try {
                const successful = document.execCommand('copy');
                // Use console.log for notification
                console.log(successful ? 'Agreement copied to clipboard!' : 'Copy failed. Please copy manually.');
            } catch (err) {
                // Use console.log for notification
                console.log('Copy failed. Please copy manually.');
            }
        }

        function downloadTxtFile() {
            const output = document.getElementById('agreementOutput').value;
            const clientName = document.getElementById('clientName').value.trim().replace(/[^a-z0-9]/gi, '_').toLowerCase();
            const filename = `ProjectAgreement_SCLDA_${clientName}.txt`;
            
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(output));
            element.setAttribute('download', filename);

            element.style.display = 'none';
            document.body.appendChild(element);

            element.click();

            document.body.removeChild(element);
        }
        
        async function downloadPdfFile() {
            const loadingOverlay = document.getElementById('loadingOverlay');
            const statusMessage = document.getElementById('statusMessage');

            // Clear previous message
            statusMessage.classList.add('hidden');
            statusMessage.textContent = '';
            
            loadingOverlay.classList.add('visible');

            // --- 1. GET ALL NECESSARY INPUTS & FORMATTING ---
            const clientName = document.getElementById('clientName').value.trim();
            const clientEmail = document.getElementById('clientEmail').value.trim();
            const projectType = document.getElementById('projectType').value.trim();
            const agreementDate = document.getElementById('agreementDate').value.trim();
            const totalFeeInput = document.getElementById('totalFee').value.replace(/[^0-9.]/g, '');
            const revisionFeeInput = document.getElementById('revisionFee').value.replace(/[^0-9.]/g, '');
            const totalFee = parseFloat(totalFeeInput) || 0;
            const revisionFee = parseFloat(revisionFeeInput) || 0;
            const bankName = document.getElementById('bankName').value.trim();
            const accountNumber = document.getElementById('accountNumber').value.trim();
            const projectOverview = document.getElementById('projectOverview').value.trim();
            const keyOutcomes = document.getElementById('keyOutcomes').value.trim();
            const workPlanInput = document.getElementById('workPlan').value.trim();
            
            const halfFee = totalFee / 2;
            const formattedTotal = formatCurrency(totalFee);
            const formattedHalf = formatCurrency(halfFee);
            const formattedRevisionFee = formatCurrency(revisionFee);
            const formattedDate = getCurrentDateFormatted(agreementDate);

            const workPlanLines = workPlanInput.split('\n').filter(line => line.trim() !== '');
            const keyOutcomesLines = keyOutcomes.split('\n').filter(line => line.trim() !== '');

            const filename = `ProjectAgreement_SCLDA_${clientName.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.pdf`;
            
            try {
                // --- 2. INITIALIZE PDF ---
                const pdf = new jsPDF('p', 'mm', 'a4');
                let yPos = 20;
                const margin = 20;
                const lineSpacing = 6; // Standard spacing between lines (mm)
                const bodyFontSize = 10;
                const headingFontSize = 14;
                const subHeadingFontSize = 12;
                const pageWidth = pdf.internal.pageSize.getWidth();

                // Helper to check for page break (A4 is 297mm high. Use 277 for a 20mm bottom margin)
                const checkPageBreak = (requiredSpace = lineSpacing) => {
                    if (yPos + requiredSpace > 277) { 
                        pdf.addPage();
                        yPos = margin; // Reset yPos to top margin
                    }
                };

                // Helper for standard text wrapping
                const addWrappedText = (text, x, y, size, style = 'normal') => {
                    pdf.setFont('helvetica', style);
                    pdf.setFontSize(size);
                    // Force the text width for wrapping
                    const splitText = pdf.splitTextToSize(text, pageWidth - margin * 2); 
                    pdf.text(splitText, x, y);
                    // Return total height used by the wrapped text (number of lines * standard spacing)
                    return splitText.length * lineSpacing; 
                };

                // Helper for list item wrapping with indent (used for Key Outcomes)
                const addListText = (text, x, y, size, style = 'normal', indent = 0) => {
                    pdf.setFont('helvetica', style);
                    pdf.setFontSize(size);
                    const wrapWidth = pageWidth - margin * 2 - indent;
                    const splitText = pdf.splitTextToSize(text, wrapWidth); 
                    
                    let currentY = y;
                    splitText.forEach((line) => {
                        checkPageBreak(lineSpacing);
                        pdf.text(line, x + indent, currentY);
                        currentY += lineSpacing;
                    });
                    
                    return currentY - y; // Return total height used
                }
                
                // --- HEADER / COVER INFO ---
                pdf.setFont('helvetica', 'bold');
                pdf.setFontSize(24);
                pdf.text('SCL DA Project Agreement', margin, yPos);
                yPos += lineSpacing * 1.5;

                pdf.setFontSize(18);
                pdf.text(projectType.toUpperCase(), margin, yPos);
                yPos += lineSpacing * 2;

                pdf.setFontSize(bodyFontSize);
                pdf.setFont('helvetica', 'normal');
                pdf.text(`Created by: Shinsa L Lomboto (shinsa@softwarecreativelabs.com)`, margin, yPos); yPos += lineSpacing;
                pdf.text(`Prepared for: ${clientName} (${clientEmail})`, margin, yPos); yPos += lineSpacing;
                pdf.text(`Date: ${formattedDate}`, margin, yPos); yPos += lineSpacing * 2;
                
                // --- SECTION 1: ABOUT ---
                checkPageBreak(30);
                pdf.setLineWidth(0.5);
                pdf.line(margin, yPos, pageWidth - margin, yPos); // Separator line
                yPos += lineSpacing * 1.5;

                pdf.setFontSize(headingFontSize);
                pdf.setFont('helvetica', 'bold');
                pdf.text('1. ABOUT SCL DA DEVELOPMENT™', margin, yPos);
                yPos += lineSpacing;
                
                pdf.setFontSize(subHeadingFontSize);
                pdf.setFont('helvetica', 'bold');
                pdf.text('SCL DA Development™', margin, yPos);
                yPos += lineSpacing;

                pdf.setFontSize(bodyFontSize);
                pdf.setFont('helvetica', 'normal');
                
                let text = "SCL DA Development™ is the technology arm of SCL Digital Agency, offering technology development solutions that blend creative innovation with smart engineering. We specialize in web platforms, mobile apps, software systems, and digital experiences.";
                yPos += addWrappedText(text, margin, yPos, bodyFontSize);
                yPos += lineSpacing * 1.5;


                // --- SECTION 2: PROJECT OVERVIEW ---
                checkPageBreak(50 + (keyOutcomesLines.length * lineSpacing));
                yPos += lineSpacing * 0.5;
                pdf.line(margin, yPos, pageWidth - margin, yPos); // Separator line
                yPos += lineSpacing * 1.5;

                pdf.setFontSize(headingFontSize);
                pdf.setFont('helvetica', 'bold');
                pdf.text('2. PROJECT OVERVIEW', margin, yPos);
                yPos += lineSpacing;

                pdf.setFontSize(bodyFontSize);
                pdf.setFont('helvetica', 'normal');
                yPos += addWrappedText(projectOverview, margin, yPos, bodyFontSize);
                yPos += lineSpacing * 1.5;

                // Key Outcomes List
                pdf.setFontSize(subHeadingFontSize);
                pdf.setFont('helvetica', 'bold');
                pdf.text('Key Outcomes:', margin, yPos);
                yPos += lineSpacing;
                
                pdf.setFontSize(bodyFontSize);
                pdf.setFont('helvetica', 'normal');
                keyOutcomesLines.forEach(outcome => {
                    const bulletText = `\u2022 ${outcome}`; // \u2022 is a bullet point
                    // Use the new helper for lists
                    const heightUsed = addListText(bulletText, margin, yPos, bodyFontSize, 'normal', 4); // 4mm indent
                    yPos += heightUsed; 
                });
                yPos += lineSpacing;


                // --- SECTION 3: WORK PLAN AND MILESTONES ---
                checkPageBreak(40 + (workPlanLines.length * lineSpacing * 2)); 
                yPos += lineSpacing * 0.5;
                pdf.line(margin, yPos, pageWidth - margin, yPos); // Separator line
                yPos += lineSpacing * 1.5;
                
                pdf.setFontSize(headingFontSize);
                pdf.setFont('helvetica', 'bold');
                pdf.text('3. WORK PLAN AND MILESTONES', margin, yPos);
                yPos += lineSpacing;

                pdf.setFontSize(bodyFontSize);
                pdf.setFont('helvetica', 'normal');
                text = "The following milestones define the key deliverables and timeline for this project:";
                yPos += addWrappedText(text, margin, yPos, bodyFontSize);
                yPos += lineSpacing;
                
                // Work Plan List (Formatted as text columns in the PDF)
                pdf.setFont('helvetica', 'bold');
                pdf.text('Week', margin, yPos);
                pdf.text('Phase', margin + 25, yPos);
                pdf.text('Deliverables', margin + 65, yPos);
                yPos += lineSpacing * 0.5;
                pdf.line(margin, yPos, pageWidth - margin, yPos); // Separator line for table header
                yPos += lineSpacing;

                pdf.setFont('helvetica', 'normal');
                workPlanLines.forEach(line => {
                    checkPageBreak(lineSpacing * 2);
                    const parts = line.split('|').map(p => p.trim());
                    if (parts.length >= 3) {
                        pdf.text(parts[0], margin, yPos);
                        pdf.text(parts[1], margin + 25, yPos);
                        
                        // Use wrapped text for the deliverable
                        const deliverableText = parts.slice(2).join(' ').trim();
                        pdf.setFontSize(bodyFontSize);
                        pdf.setFont('helvetica', 'normal');
                        // Split only the deliverable text based on its column width
                        const splitDeliverable = pdf.splitTextToSize(deliverableText, pageWidth - (margin + 65) - margin); 
                        
                        let currentY = yPos;
                        splitDeliverable.forEach((textLine) => {
                            pdf.text(textLine, margin + 65, currentY);
                            currentY += lineSpacing;
                        });
                        
                        // Set yPos to the maximum vertical position used
                        yPos = currentY; 
                    }
                });
                yPos += lineSpacing;


                // --- SECTION 4: SERVICE FEES ---
                checkPageBreak(50);
                yPos += lineSpacing * 0.5;
                pdf.line(margin, yPos, pageWidth - margin, yPos); // Separator line
                yPos += lineSpacing * 1.5;

                pdf.setFontSize(headingFontSize);
                pdf.setFont('helvetica', 'bold');
                pdf.text('4. SERVICE FEES', margin, yPos);
                yPos += lineSpacing * 1.5;

                pdf.setFontSize(subHeadingFontSize);
                pdf.setFont('helvetica', 'normal');
                pdf.text(`Deposit:`, margin, yPos);
                pdf.setFont('helvetica', 'bold');
                pdf.text(formattedHalf, margin + 50, yPos);
                yPos += lineSpacing;
                
                pdf.setFont('helvetica', 'normal');
                pdf.text(`Full Settlement:`, margin, yPos);
                pdf.setFont('helvetica', 'bold');
                pdf.text(formattedHalf, margin + 50, yPos);
                yPos += lineSpacing;
                
                pdf.setFont('helvetica', 'normal');
                pdf.text(`Total Project Fee:`, margin, yPos);
                pdf.setFont('helvetica', 'bold');
                pdf.text(formattedTotal, margin + 50, yPos);
                yPos += lineSpacing * 2;


                // --- SECTION 5: PAYMENT POLICY ---
                checkPageBreak(100);
                yPos += lineSpacing * 0.5;
                pdf.line(margin, yPos, pageWidth - margin, yPos); // Separator line
                yPos += lineSpacing * 1.5;

                pdf.setFontSize(headingFontSize);
                pdf.setFont('helvetica', 'bold');
                pdf.text('5. PAYMENT POLICY', margin, yPos);
                yPos += lineSpacing;
                
                pdf.setFontSize(bodyFontSize);
                pdf.setFont('helvetica', 'normal');
                text = `Client shall pay us ${formattedTotal} for the services performed under this contract. The payment policy for the project is:`;
                yPos += addWrappedText(text, margin, yPos, bodyFontSize);
                yPos += lineSpacing * 0.5;
                
                // Bullet points
                yPos += addListText(`\u2022 A non-refundable down payment of 50% (${formattedHalf}) of the total project cost upon signing this contract.`, margin, yPos, bodyFontSize, 'normal', 4);
                yPos += addListText(`\u2022 The remaining 50% (${formattedHalf}) shall be paid in full before the delivery of the final materials and official site launch.`, margin, yPos, bodyFontSize, 'normal', 4);
                yPos += lineSpacing * 0.5;
                
                pdf.setFont('helvetica', 'bold');
                checkPageBreak(lineSpacing);
                pdf.text('Payments can be made via:', margin, yPos);
                yPos += lineSpacing;
                
                pdf.setFont('helvetica', 'normal');
                checkPageBreak(lineSpacing);
                pdf.text(`Bank: ${bankName}`, margin, yPos); yPos += lineSpacing;
                checkPageBreak(lineSpacing);
                pdf.text(`Account Number: ${accountNumber}`, margin, yPos); yPos += lineSpacing;
                checkPageBreak(lineSpacing);
                pdf.text(`Account Holder: SCL Digital Agency (Pty) Ltd`, margin, yPos); yPos += lineSpacing;
                checkPageBreak(lineSpacing);
                pdf.text(`Branch Code: [Insert Branch Code]`, margin, yPos); yPos += lineSpacing;
                checkPageBreak(lineSpacing);
                pdf.text(`Swift Code: [Insert Swift Code]`, margin, yPos); yPos += lineSpacing * 2;


                // --- SECTION 6: OWNERSHIP & RIGHTS ---
                checkPageBreak(120);
                yPos += lineSpacing * 0.5;
                pdf.line(margin, yPos, pageWidth - margin, yPos); // Separator line
                yPos += lineSpacing * 1.5;

                pdf.setFontSize(headingFontSize);
                pdf.setFont('helvetica', 'bold');
                pdf.text('6. OWNERSHIP & RIGHTS', margin, yPos);
                yPos += lineSpacing * 1.5;

                // Transfer of Rights
                checkPageBreak(lineSpacing * 2);
                pdf.setFontSize(subHeadingFontSize);
                pdf.setFont('helvetica', 'bold');
                pdf.text('Transfer of Rights:', margin, yPos);
                yPos += lineSpacing;
                
                pdf.setFontSize(bodyFontSize);
                pdf.setFont('helvetica', 'normal');
                text = "Upon full payment of the compensation set forth in this contract, Client shall be the exclusive owner of all intellectual property rights, including but not limited to copyrights and trademarks, in and to the work product produced by Developer/Designer in connection with this contract. All sketches designed during this project, which are not used by the Client, will remain the property of the Developer/Designer.";
                yPos += addWrappedText(text, margin, yPos, bodyFontSize);
                yPos += lineSpacing * 1.5;

                // Trademark Infringements
                checkPageBreak(lineSpacing * 2);
                pdf.setFontSize(subHeadingFontSize);
                pdf.setFont('helvetica', 'bold');
                pdf.text('Trademark Infringements:', margin, yPos);
                yPos += lineSpacing;

                pdf.setFontSize(bodyFontSize);
                pdf.setFont('helvetica', 'normal');
                text = "The Developer/Designer shall not be held responsible for any costs or legal liabilities arising from trademark infringements or other intellectual property issues related to the design materials after full payment has been made.";
                yPos += addWrappedText(text, margin, yPos, bodyFontSize);
                yPos += lineSpacing * 1.5;

                // Portfolio Usage
                checkPageBreak(lineSpacing * 2);
                pdf.setFontSize(subHeadingFontSize);
                pdf.setFont('helvetica', 'bold');
                pdf.text('Portfolio Usage:', margin, yPos);
                yPos += lineSpacing;

                pdf.setFontSize(bodyFontSize);
                pdf.setFont('helvetica', 'normal');
                text = "The Developer/Designer is granted the right to use the completed design materials for portfolio and self-promotion purposes.";
                yPos += addWrappedText(text, margin, yPos, bodyFontSize);
                yPos += lineSpacing * 2;


                // --- SECTION 7: AGREEMENTS (All subsections) ---
                checkPageBreak(300); // Trigger page break if not enough room for the rest of the document
                yPos += lineSpacing * 0.5;
                pdf.line(margin, yPos, pageWidth - margin, yPos); // Separator line
                yPos += lineSpacing * 1.5;

                pdf.setFontSize(headingFontSize);
                pdf.setFont('helvetica', 'bold');
                pdf.text('7. AGREEMENTS', margin, yPos);
                yPos += lineSpacing * 1.5;

                // Revision and Feedback
                checkPageBreak(lineSpacing * 2);
                pdf.setFontSize(subHeadingFontSize);
                pdf.setFont('helvetica', 'bold');
                pdf.text('Revision and Feedback', margin, yPos);
                yPos += lineSpacing;

                pdf.setFontSize(bodyFontSize);
                pdf.setFont('helvetica', 'normal');
                text = `The Client agrees to provide timely feedback and request revisions, if necessary, within 3 days of receiving deliverables. The client receives a maximum of 7 revisions. In the event that further revisions become necessary beyond what was initially agreed upon, each additional round of revisions will incur an additional fee of ${formattedRevisionFee} per round. These charges will be included in the final invoice.`;
                yPos += addWrappedText(text, margin, yPos, bodyFontSize);
                yPos += lineSpacing * 1.5;

                // Confidentiality
                checkPageBreak(lineSpacing * 2);
                pdf.setFontSize(subHeadingFontSize);
                pdf.setFont('helvetica', 'bold');
                pdf.text('Confidentiality', margin, yPos);
                yPos += lineSpacing;

                pdf.setFontSize(bodyFontSize);
                pdf.setFont('helvetica', 'normal');
                text = "Client and Developer/Designer agree to maintain the confidentiality of any proprietary or sensitive information shared during the project.";
                yPos += addWrappedText(text, margin, yPos, bodyFontSize);
                yPos += lineSpacing * 1.5;

                // Cancellation
                checkPageBreak(lineSpacing * 2);
                pdf.setFontSize(subHeadingFontSize);
                pdf.setFont('helvetica', 'bold');
                pdf.text('Cancellation', margin, yPos);
                yPos += lineSpacing;

                pdf.setFontSize(bodyFontSize);
                pdf.setFont('helvetica', 'normal');
                text = "Client or Developer/Designer may terminate this contract with written notice if the other Party breaches any material term or condition. In the event of termination, the Client shall pay for any work completed up to that point. If the Client decides to cancel the project after ideas and proposals have been submitted, refunds for any previous payments made will not be provided.";
                yPos += addWrappedText(text, margin, yPos, bodyFontSize);
                yPos += lineSpacing * 1.5;

                // Unforeseen Circumstances
                checkPageBreak(lineSpacing * 2);
                pdf.setFontSize(subHeadingFontSize);
                pdf.setFont('helvetica', 'bold');
                pdf.text('Unforeseen Circumstances', margin, yPos);
                yPos += lineSpacing;

                pdf.setFontSize(bodyFontSize);
                pdf.setFont('helvetica', 'normal');
                text = "In the event that the Designer becomes incapacitated or unable to continue the project due to unexpected and uncontrollable circumstances (e.g., acts of nature, illness, or other emergencies), a portion of the total project budget may be reimbursed. In most cases, a full refund will be issued. If the work completed thus far can be utilized by another designer to continue the project, a refund percentage will be determined based on the work completed. Alternatively, any reasonable suggestions for handling the situation will be taken into consideration.";
                yPos += addWrappedText(text, margin, yPos, bodyFontSize);
                yPos += lineSpacing * 1.5;

                // Project Suspension
                checkPageBreak(lineSpacing * 2);
                pdf.setFontSize(subHeadingFontSize);
                pdf.setFont('helvetica', 'bold');
                pdf.text('Project Suspension', margin, yPos);
                yPos += lineSpacing;

                pdf.setFontSize(bodyFontSize);
                pdf.setFont('helvetica', 'normal');
                text = "Should the project need to be suspended for any reason, the Client and Developer/Designer shall discuss the terms and conditions for resuming the project at a later date.";
                yPos += addWrappedText(text, margin, yPos, bodyFontSize);
                yPos += lineSpacing * 1.5;

                // Entire Agreement
                checkPageBreak(lineSpacing * 2);
                pdf.setFontSize(subHeadingFontSize);
                pdf.setFont('helvetica', 'bold');
                pdf.text('Entire Agreement', margin, yPos);
                yPos += lineSpacing;

                pdf.setFontSize(bodyFontSize);
                pdf.setFont('helvetica', 'normal');
                text = "This agreement constitutes the entire agreement between the parties and supersedes all prior negotiations, understandings, and agreements between them, whether written or oral, relating to the subject matter of this contract.";
                yPos += addWrappedText(text, margin, yPos, bodyFontSize);
                yPos += lineSpacing * 1.5;

                // Amendment
                checkPageBreak(lineSpacing * 2);
                pdf.setFontSize(subHeadingFontSize);
                pdf.setFont('helvetica', 'bold');
                pdf.text('Amendment', margin, yPos);
                yPos += lineSpacing;

                pdf.setFontSize(bodyFontSize);
                pdf.setFont('helvetica', 'normal');
                text = "This agreement may be amended or modified only by written agreement signed by both parties.";
                yPos += addWrappedText(text, margin, yPos, bodyFontSize);
                yPos += lineSpacing * 2;


                // --- SECTION 8: SIGNATURES ---
                checkPageBreak(70);
                yPos += lineSpacing * 0.5;
                pdf.line(margin, yPos, pageWidth - margin, yPos); // Separator line
                yPos += lineSpacing * 1.5;

                pdf.setFontSize(headingFontSize);
                pdf.setFont('helvetica', 'bold');
                pdf.text('8. SIGNATURES', margin, yPos);
                yPos += lineSpacing * 1.5;
                
                pdf.setFontSize(bodyFontSize);
                pdf.setFont('helvetica', 'normal');
                text = "By signing below, the parties acknowledge their understanding and acceptance of the terms and conditions outlined in this Agreement.";
                yPos += addWrappedText(text, margin, yPos, bodyFontSize);
                yPos += lineSpacing * 2;

                // Signature Lines
                const signatureY = yPos + lineSpacing * 4;
                const dateY = signatureY + lineSpacing;
                const devSignatureY = dateY + lineSpacing * 3;
                const devDateY = devSignatureY + lineSpacing;
                
                // Client Signature
                pdf.text("CLIENT'S SIGNATURE:", margin, signatureY);
                pdf.line(margin + 50, signatureY, margin + 150, signatureY);

                pdf.text("Date:", margin, dateY);
                pdf.line(margin + 15, dateY, margin + 50, dateY);
                
                // Developer Signature
                pdf.text("DESIGNER / DEVELOPER'S SIGNATURE:", margin, devSignatureY);
                pdf.line(margin + 75, devSignatureY, margin + 175, devSignatureY);
                
                pdf.text("Date:", margin, devDateY);
                pdf.line(margin + 15, devDateY, margin + 50, devDateY);
                
                // Final footer space
                yPos = devDateY + lineSpacing * 3;


                // --- SAVE PDF ---
                pdf.save(filename);
                
                // Show success message
                statusMessage.textContent = 'PDF generated and download started successfully!';
                statusMessage.className = 'mt-4 p-3 rounded-lg text-center font-semibold bg-green-100 text-green-700';

            } catch (error) {
                console.error("PDF generation error:", error);
                
                // Show error message to user
                statusMessage.textContent = 'PDF generation failed. Please check the browser console for details.';
                statusMessage.className = 'mt-4 p-3 rounded-lg text-center font-semibold bg-red-100 text-red-700';

            } finally {
                // Hide loading indicator and show status message
                loadingOverlay.classList.remove('visible');
                statusMessage.classList.remove('hidden'); 
            }
        }
    </script>
</body>
</html>
